<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Singalong</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Memberstack Loader -->
  <script
    data-memberstack-app="app_cmgnwpg8y00x10suih4pua785"
    src="https://static.memberstack.com/scripts/v2/memberstack.js"
    type="text/javascript"></script>

  <!-- Protect this page -->
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const member = await window.$memberstackDom.getCurrentMember();
        if (!member.data) window.location.href = "/subscribe.html";
      } catch {
        window.location.href = "/subscribe.html";
      }
    });
  </script>
</head>
<body class="bg-white text-gray-900 min-h-screen">
  <div class="max-w-6xl mx-auto p-6 text-center">
    <h1 class="text-6xl font-extrabold mb-4 text-blue-900">Singalong</h1>

    <div class="flex justify-center mb-8">
      <a href="apps.html"
         class="inline-flex items-center gap-2 px-8 py-4 bg-blue-900 text-white rounded-2xl font-extrabold text-2xl shadow hover:bg-blue-800 focus:outline-none focus:ring-4 focus:ring-blue-300">
        ← Back to Apps
      </a>
    </div>

    <div class="mb-4">
      <p class="text-xl text-gray-500 font-semibold">Now Singing</p>
      <h2 id="songTitle" class="text-4xl md:text-5xl font-extrabold text-blue-900 mt-1">Press "Start"</h2>
    </div>

    <!-- Lyrics -->
    <div class="mx-auto max-w-4xl border-[10px] border-blue-200 rounded-3xl bg-blue-50 shadow-2xl p-8 md:p-10 min-h-[24rem] flex items-center justify-center">
      <pre id="lyricsDisplay"
           class="whitespace-pre-wrap text-[2.2rem] md:text-[2.6rem] leading-tight font-bold text-gray-900 text-center">
Welcome! Press Next Song to begin.
      </pre>
    </div>

    <!-- Song controls -->
    <div class="flex flex-wrap justify-center gap-4 mt-8">
      <button id="prevBtn" class="bg-white border-4 border-blue-900 text-blue-900 text-2xl py-3 px-6 rounded-2xl shadow-lg hover:bg-gray-50">
        Previous
      </button>
      <button id="nextBtn" class="bg-blue-600 hover:bg-blue-800 text-white text-2xl py-3 px-6 rounded-2xl shadow-lg">
        Next Song
      </button>
      <button id="shuffleBtn" class="bg-white border-4 border-blue-900 text-blue-900 text-2xl py-3 px-6 rounded-2xl shadow-lg hover:bg-gray-50">
        Shuffle
      </button>
      <button id="autoBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white text-2xl py-3 px-6 rounded-2xl shadow-lg">
        Auto: Off
      </button>
    </div>

    <!-- Audio controls -->
    <div class="flex flex-wrap justify-center gap-4 mt-6">
      <button id="playPauseBtn" class="bg-purple-600 hover:bg-purple-700 text-white text-2xl py-3 px-6 rounded-2xl shadow-lg">
        Play
      </button>
      <button id="replayBtn" class="bg-white border-4 border-purple-700 text-purple-700 text-2xl py-3 px-6 rounded-2xl shadow-lg hover:bg-purple-50">
        Replay
      </button>
      <button id="volDownBtn" class="bg-white border-2 border-gray-500 text-gray-800 text-xl py-2 px-4 rounded-xl">Vol −</button>
      <button id="volUpBtn" class="bg-white border-2 border-gray-500 text-gray-800 text-xl py-2 px-4 rounded-xl">Vol +</button>
      <div id="volLabel" class="text-xl font-bold text-gray-700 self-center">Volume: 80%</div>
    </div>

    <!-- Font controls -->
    <div class="flex justify-center gap-4 mt-6">
      <button id="fontMinus" class="bg-white border-2 border-gray-400 text-gray-800 text-xl py-2 px-4 rounded-xl">A−</button>
      <button id="fontPlus" class="bg-white border-2 border-gray-400 text-gray-800 text-xl py-2 px-4 rounded-xl">A+</button>
    </div>

    <!-- Status -->
    <div id="statusMsg" class="mt-4 text-lg font-semibold text-gray-600"></div>

    <!-- Playlist -->
    <div id="playlist" class="mt-10 text-lg text-gray-700 flex flex-wrap justify-center gap-3"></div>
  </div>

  <!-- Hidden audio player -->
  <audio id="audioPlayer" preload="auto"></audio>

  <script>
    // Replace these with YOUR songs/lyrics/audio files.
    // Keep audio files in /audio folder for easy management.
    const songs = [
      {
        title: "Amazing Grace",
        lyrics: `[Verse 1]
Amazing grace, how sweet the sound
That saved a wretch like me
I once was lost, but now am found
Was blind, but now I see`,
        audio: "/audio/amazing-grace.mp3"
      },
      {
        title: "When the Saints Go Marching In",
        lyrics: `[Chorus]
Oh, when the saints go marching in
Oh, when the saints go marching in
Oh Lord, I want to be in that number
When the saints go marching in`,
        audio: "/audio/saints-go-marching-in.mp3"
      },
      {
        title: "You Are My Sunshine",
        lyrics: `[Verse 1]
You are my sunshine, my only sunshine
You make me happy when skies are gray
You'll never know dear, how much I love you
Please don't take my sunshine away`,
        audio: "/audio/you-are-my-sunshine.mp3"
      }
    ];

    let currentIndex = -1;
    let autoMode = false;
    let autoTimer = null;
    const AUTO_SECONDS = 25;
    let fontSize = 2.2; // rem

    const songTitleEl = document.getElementById("songTitle");
    const lyricsEl = document.getElementById("lyricsDisplay");
    const playlistEl = document.getElementById("playlist");
    const statusMsgEl = document.getElementById("statusMsg");

    const audio = document.getElementById("audioPlayer");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const autoBtn = document.getElementById("autoBtn");
    const volLabel = document.getElementById("volLabel");

    audio.volume = 0.8;
    updateVolumeLabel();

    function setStatus(msg, isWarning = false) {
      statusMsgEl.textContent = msg;
      statusMsgEl.className = `mt-4 text-lg font-semibold ${isWarning ? "text-amber-700" : "text-gray-600"}`;
    }

    function renderPlaylist() {
      playlistEl.innerHTML = "";
      songs.forEach((song, i) => {
        const chip = document.createElement("button");
        chip.className = `px-4 py-2 rounded-xl border text-base font-semibold ${
          i === currentIndex
            ? "bg-blue-900 text-white border-blue-900"
            : "bg-white text-blue-900 border-blue-300 hover:bg-blue-50"
        }`;
        chip.textContent = `${i + 1}. ${song.title}`;
        chip.addEventListener("click", () => showSong(i, true));
        playlistEl.appendChild(chip);
      });
    }

    function showSong(index, autoplay = true) {
      if (!songs.length) return;
      currentIndex = (index + songs.length) % songs.length;
      const song = songs[currentIndex];

      songTitleEl.textContent = song.title;
      lyricsEl.textContent = song.lyrics || "(No lyrics provided)";
      renderPlaylist();

      loadAudio(song.audio, autoplay);
      restartAutoIfNeeded();
    }

    function nextSong() {
      if (currentIndex === -1) showSong(0, true);
      else showSong(currentIndex + 1, true);
    }

    function prevSong() {
      if (currentIndex === -1) showSong(0, true);
      else showSong(currentIndex - 1, true);
    }

    function shuffleSong() {
      if (!songs.length) return;
      const randomIndex = Math.floor(Math.random() * songs.length);
      showSong(randomIndex, true);
    }

    function loadAudio(src, autoplay = true) {
      audio.pause();
      playPauseBtn.textContent = "Play";

      if (!src) {
        audio.removeAttribute("src");
        audio.load();
        setStatus("No audio file linked for this song.", true);
        return;
      }

      audio.src = src;
      audio.load();

      if (autoplay) {
        audio.play()
          .then(() => {
            playPauseBtn.textContent = "Pause";
            setStatus("Playing...");
          })
          .catch(() => {
            // Browser blocked autoplay until user interacts
            setStatus("Song loaded. Press Play to start audio.", true);
          });
      } else {
        setStatus("Song loaded. Press Play.");
      }
    }

    function togglePlayPause() {
      if (!audio.src) {
        setStatus("No audio loaded for this song.", true);
        return;
      }

      if (audio.paused) {
        audio.play()
          .then(() => {
            playPauseBtn.textContent = "Pause";
            setStatus("Playing...");
          })
          .catch(() => setStatus("Unable to play audio on this device.", true));
      } else {
        audio.pause();
        playPauseBtn.textContent = "Play";
        setStatus("Paused.");
      }
    }

    function replayAudio() {
      if (!audio.src) {
        setStatus("No audio loaded for this song.", true);
        return;
      }
      audio.currentTime = 0;
      audio.play()
        .then(() => {
          playPauseBtn.textContent = "Pause";
          setStatus("Replaying...");
        })
        .catch(() => setStatus("Unable to replay audio.", true));
    }

    function updateVolumeLabel() {
      volLabel.textContent = `Volume: ${Math.round(audio.volume * 100)}%`;
    }

    function volumeUp() {
      audio.volume = Math.min(1, audio.volume + 0.1);
      updateVolumeLabel();
    }

    function volumeDown() {
      audio.volume = Math.max(0, audio.volume - 0.1);
      updateVolumeLabel();
    }

    function toggleAuto() {
      autoMode = !autoMode;
      autoBtn.textContent = `Auto: ${autoMode ? "On" : "Off"}`;

      if (autoMode) {
        if (currentIndex === -1) showSong(0, true);
        startAuto();
      } else {
        stopAuto();
      }
    }

    function startAuto() {
      stopAuto();
      autoTimer = setInterval(nextSong, AUTO_SECONDS * 1000);
      setStatus(`Auto mode on: changing songs every ${AUTO_SECONDS} seconds.`);
    }

    function stopAuto() {
      if (autoTimer) clearInterval(autoTimer);
      autoTimer = null;
      if (!audio.paused) setStatus("Auto mode off. Playing current song.");
      else setStatus("Auto mode off.");
    }

    function restartAutoIfNeeded() {
      if (autoMode) startAuto();
    }

    function setFontSize() {
      lyricsEl.style.fontSize = `${fontSize}rem`;
    }

    // When a song ends, keep button in sync.
    audio.addEventListener("ended", () => {
      playPauseBtn.textContent = "Play";
      setStatus("Song ended.");
      // Optional: uncomment to auto-advance at end of each track
      // nextSong();
    });

    audio.addEventListener("error", () => {
      setStatus("Could not load this audio file. Check path/filename.", true);
      playPauseBtn.textContent = "Play";
    });

    // UI handlers
    document.getElementById("nextBtn").addEventListener("click", nextSong);
    document.getElementById("prevBtn").addEventListener("click", prevSong);
    document.getElementById("shuffleBtn").addEventListener("click", shuffleSong);
    document.getElementById("autoBtn").addEventListener("click", toggleAuto);

    document.getElementById("playPauseBtn").addEventListener("click", togglePlayPause);
    document.getElementById("replayBtn").addEventListener("click", replayAudio);
    document.getElementById("volUpBtn").addEventListener("click", volumeUp);
    document.getElementById("volDownBtn").addEventListener("click", volumeDown);

    document.getElementById("fontPlus").addEventListener("click", () => {
      fontSize = Math.min(4.2, fontSize + 0.2);
      setFontSize();
    });

    document.getElementById("fontMinus").addEventListener("click", () => {
      fontSize = Math.max(1.4, fontSize - 0.2);
      setFontSize();
    });

    // Init
    renderPlaylist();
    setFontSize();
    setStatus("Ready. Press Next Song to start.");
  </script>
</body>
</html>
