<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Then vs Now — Prices</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script
    data-memberstack-app="app_cmgnwpg8y00x10suih4pua785"
    src="https://static.memberstack.com/scripts/v2/memberstack.js"
    type="text/javascript"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const member = await window.$memberstackDom.getCurrentMember();
        if (!member.data) window.location.href = "/subscribe.html";
      } catch {
        window.location.href = "/subscribe.html";
      }
    });
  </script>
</head>

<body class="bg-slate-100 text-slate-900 min-h-screen">

<div class="max-w-6xl mx-auto p-6 text-center">

  <h1 class="text-5xl md:text-6xl font-extrabold text-amber-700 mb-4">
    Then vs Now — Prices
  </h1>

  <p class="text-xl md:text-2xl mb-6 font-semibold text-gray-700">
    How much things used to cost
  </p>

  <div class="flex justify-center gap-4 mb-6">
    <input id="dateInput" type="date"
      class="text-2xl px-4 py-3 border-4 border-amber-200 rounded-xl font-bold bg-white" />

    <button id="loadBtn"
      class="bg-amber-600 text-white px-6 py-3 rounded-xl text-2xl font-bold">
      Load
    </button>

    <button id="fullscreenBtn"
      class="bg-blue-700 text-white px-6 py-3 rounded-xl text-2xl font-bold">
      Full Screen
    </button>
  </div>

  <div id="stage"
    class="relative h-[32rem] md:h-[38rem] rounded-3xl shadow-2xl overflow-hidden border-8 border-white bg-gradient-to-br from-amber-700 via-orange-600 to-rose-600">

    <div id="slide"
      class="absolute inset-0 flex flex-col justify-center items-center text-white p-10 text-center">

      <div id="yearBadge"
        class="mb-6 text-4xl font-black bg-yellow-300 text-black px-6 py-3 rounded-xl">
        1960s → Today
      </div>

      <div id="factText"
        class="text-4xl md:text-5xl font-extrabold leading-tight max-w-4xl">
        Loading...
      </div>

      <div id="progress"
        class="mt-6 text-2xl font-bold">
        0 / 0
      </div>

    </div>
  </div>

</div>

<script>
const AUTO_SECONDS = 10;
const TOTAL_SLIDES = 8;

let slides = [];
let idx = -1;
let timer = null;

const PRICES = [
  { era:"1950s", item:"Cup of coffee", then:"$0.10", now:"$3.00+" },
  { era:"1960s", item:"Movie ticket", then:"$1.00", now:"$12.00+" },
  { era:"1970s", item:"Gas (gallon)", then:"$0.36", now:"$3.50+" },
  { era:"1980s", item:"New car", then:"$7,200", now:"$48,000+" },
  { era:"1970s", item:"Bread", then:"$0.25", now:"$2.50+" },
  { era:"1960s", item:"Haircut", then:"$2.00", now:"$25.00+" },
  { era:"1950s", item:"Postage stamp", then:"$0.03", now:"$0.73" },
  { era:"1960s", item:"Candy bar", then:"$0.05", now:"$1.50+" },
  { era:"1970s", item:"Eggs (dozen)", then:"$0.60", now:"$3.00+" },
  { era:"1960s", item:"Hamburger", then:"$0.20", now:"$3.00+" },
  { era:"1970s", item:"Milk (gallon)", then:"$1.30", now:"$4.00+" },
  { era:"1980s", item:"VCR", then:"$1,000", now:"Streaming" },
  { era:"1960s", item:"Soda", then:"$0.10", now:"$2.00+" },
  { era:"1970s", item:"TV set", then:"$500", now:"$400+" },
  { era:"1950s", item:"Jeans", then:"$5.00", now:"$50+" },
  { era:"1960s", item:"Pizza", then:"$1.50", now:"$15+" },
  { era:"1970s", item:"College tuition", then:"$500", now:"$10,000+" },
  { era:"1980s", item:"Walkman", then:"$100", now:"Phone app" },
  { era:"1960s", item:"Hot dog", then:"$0.15", now:"$3.00+" },
  { era:"1970s", item:"Movie popcorn", then:"$0.50", now:"$8.00+" }
];

const factText = document.getElementById("factText");
const yearBadge = document.getElementById("yearBadge");
const progress = document.getElementById("progress");

function setToday(){
  const d = new Date();
  document.getElementById("dateInput").value =
    d.toISOString().split("T")[0];
}

function seededShuffle(arr, seed){
  let a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = (seed + i*13) % (i+1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildSlides(){
  const date = document.getElementById("dateInput").value;
  const [y,m,d] = date.split("-");
  const seed = Number(m)*100 + Number(d);

  const shuffled = seededShuffle(PRICES, seed);

  slides = shuffled.slice(0, TOTAL_SLIDES).map(p => ({
    text: `${p.item}: then ${p.then}, now about ${p.now}`,
    year: `${p.era} → Today`
  }));

  idx = -1;
  nextSlide();
  startAuto();
}

function nextSlide(){
  if(!slides.length) return;

  idx = (idx+1)%slides.length;
  const s = slides[idx];

  factText.textContent = s.text;
  yearBadge.textContent = s.year;
  progress.textContent = `${idx+1} / ${slides.length}`;
}

function startAuto(){
  clearInterval(timer);
  timer = setInterval(nextSlide, AUTO_SECONDS*1000);
}

document.getElementById("loadBtn").onclick = buildSlides;
document.getElementById("fullscreenBtn").onclick = () => {
  document.documentElement.requestFullscreen();
};

setToday();
buildSlides();
</script>

</body>
</html>
