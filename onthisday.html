<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morning Coffee — On This Day</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script
    data-memberstack-app="app_cmgnwpg8y00x10suih4pua785"
    src="https://static.memberstack.com/scripts/v2/memberstack.js"
    type="text/javascript"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const member = await window.$memberstackDom.getCurrentMember();
        if (!member.data) window.location.href = "/subscribe.html";
      } catch {
        window.location.href = "/subscribe.html";
      }
    });
  </script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-900">
  <div class="max-w-7xl mx-auto p-6 text-center">
    <h1 class="text-5xl md:text-6xl font-extrabold text-amber-700 mb-2">Morning Coffee — On This Day</h1>
    <p class="text-xl md:text-2xl text-slate-700 font-semibold mb-6">
      Famous faces, fun memories, and prices from back then
    </p>

    <div class="flex justify-center mb-6">
      <a href="apps.html"
         class="inline-flex items-center gap-2 px-8 py-4 bg-blue-900 text-white rounded-2xl font-extrabold text-2xl shadow hover:bg-blue-800">
        ← Back to Apps
      </a>
    </div>

    <div class="flex flex-wrap justify-center items-center gap-4 mb-6">
      <input id="dateInput" type="date"
             class="text-2xl px-4 py-3 border-4 border-amber-200 rounded-xl font-bold bg-white" />
      <button id="loadBtn"
              class="bg-amber-600 hover:bg-amber-700 text-white text-2xl py-3 px-6 rounded-2xl shadow-lg font-extrabold">
        Load Today
      </button>
      <button id="autoBtn"
              class="bg-emerald-600 hover:bg-emerald-700 text-white text-2xl py-3 px-6 rounded-2xl shadow-lg font-extrabold">
        Auto: On
      </button>
      <button id="fullscreenBtn"
              class="bg-blue-700 hover:bg-blue-800 text-white text-2xl py-3 px-6 rounded-2xl shadow-lg font-extrabold">
        Full Screen
      </button>
    </div>

    <div id="filters" class="flex flex-wrap justify-center gap-3 mb-6"></div>

    <div id="stage"
         class="relative max-w-6xl mx-auto h-[32rem] md:h-[38rem] rounded-[2rem] shadow-2xl overflow-hidden border-[10px] border-white bg-gradient-to-br from-amber-700 via-orange-600 to-rose-600">
      <div id="slide"
           class="absolute inset-0 p-8 md:p-12 flex flex-col justify-between text-white transition-all duration-500 opacity-100 translate-x-0">
        <div class="flex justify-between items-start gap-4">
          <div id="typeChip"
               class="inline-block px-5 py-2 rounded-full text-xl md:text-2xl font-extrabold bg-white/20 backdrop-blur">
            Celebrity Spotlight
          </div>
          <div id="yearBadge"
               class="inline-block px-6 py-3 rounded-2xl text-3xl md:text-4xl font-black bg-yellow-300 text-slate-900 shadow-lg">
            Today
          </div>
        </div>

        <div class="flex-1 flex items-center justify-center px-2">
          <p id="factText"
             class="text-[2.2rem] md:text-[3rem] leading-tight font-extrabold max-w-5xl">
            Loading today’s coffee-time facts...
          </p>
        </div>

        <div class="flex justify-between items-center text-lg md:text-2xl font-bold">
          <span id="slideDate">Date: —</span>
          <span id="progress">0 / 0</span>
        </div>
      </div>
    </div>

    <div class="flex flex-wrap justify-center gap-4 mt-8">
      <button id="prevBtn" class="bg-white border-4 border-blue-900 text-blue-900 text-2xl py-3 px-6 rounded-2xl shadow-lg hover:bg-gray-50 font-extrabold">
        ◀ Previous
      </button>
      <button id="nextBtn" class="bg-blue-600 hover:bg-blue-800 text-white text-2xl py-3 px-6 rounded-2xl shadow-lg font-extrabold">
        Next ▶
      </button>
      <button id="shuffleBtn" class="bg-white border-4 border-blue-900 text-blue-900 text-2xl py-3 px-6 rounded-2xl shadow-lg hover:bg-gray-50 font-extrabold">
        Shuffle
      </button>
    </div>

    <p id="status" class="mt-5 text-xl font-semibold text-gray-600">Ready.</p>
  </div>

  <script>
    const AUTO_SECONDS = 10;

    const typeMap = {
      selected: "All",
      list: ["All", "Celebrity Spotlight", "Remember When", "Then vs Now"],
    };

    let allSlides = [];
    let slides = [];
    let idx = -1;
    let autoOn = true;
    let timer = null;

    const slideEl = document.getElementById("slide");
    const stageEl = document.getElementById("stage");
    const factTextEl = document.getElementById("factText");
    const yearBadgeEl = document.getElementById("yearBadge");
    const typeChipEl = document.getElementById("typeChip");
    const progressEl = document.getElementById("progress");
    const slideDateEl = document.getElementById("slideDate");
    const statusEl = document.getElementById("status");
    const autoBtn = document.getElementById("autoBtn");

    const FUN_PRICE_COMPARISONS = [
      { thenYear: "1950s", item: "Cup of coffee", thenCost: "$0.10", nowCost: "$3.00+" },
      { thenYear: "1960s", item: "Movie ticket", thenCost: "$1.00", nowCost: "$12.00+" },
      { thenYear: "1970s", item: "Gallon of gas", thenCost: "$0.36", nowCost: "$3.50+" },
      { thenYear: "1980s", item: "New car", thenCost: "$7,200", nowCost: "$48,000+" },
      { thenYear: "1970s", item: "Loaf of bread", thenCost: "$0.25", nowCost: "$2.50+" },
      { thenYear: "1960s", item: "Haircut", thenCost: "$2.00", nowCost: "$25.00+" },
      { thenYear: "1950s", item: "Postage stamp", thenCost: "$0.03", nowCost: "$0.73" },
      { thenYear: "1960s", item: "Candy bar", thenCost: "$0.05", nowCost: "$1.50+" },
      { thenYear: "1970s", item: "Dozen eggs", thenCost: "$0.60", nowCost: "$3.00+" },
      { thenYear: "1960s", item: "Hamburger", thenCost: "$0.20", nowCost: "$3.00+" }
    ];

    const OFFLINE_CELEBS = [
      { year: "1934", text: "Doris Day was born. She became one of America’s favorite singers and actresses." },
      { year: "1940", text: "Ringo Starr was born. He became the drummer for the Beatles." },
      { year: "1942", text: "Muhammad Ali was born. He became one of America’s most famous boxers." },
      { year: "1946", text: "Dolly Parton was born. She became a country music legend." },
      { year: "1963", text: "Michael Jordan was born. He became one of basketball’s biggest stars." },
      { year: "1926", text: "Queen Elizabeth II was born. Americans followed her life for many years." },
      { year: "1935", text: "Elvis Presley rose to fame and became one of the biggest names in music." },
      { year: "1958", text: "Prince was born. He became one of America’s most unforgettable performers." },
      { year: "1945", text: "Rod Stewart was born. His songs became familiar to generations of listeners." },
      { year: "1941", text: "Ann-Margret was born. She became a well-known movie star." }
    ];

    const OFFLINE_REMEMBER_WHEN = [
      { year: "1955", text: "Disneyland opened in California and families could not wait to visit." },
      { year: "1962", text: "Walmart opened its first store in America." },
      { year: "1971", text: "Walt Disney World opened in Florida." },
      { year: "1981", text: "MTV launched and changed the way America watched music." },
      { year: "1950s", text: "Black-and-white TV sets were the center of many American living rooms." },
      { year: "1960s", text: "Drive-in movies were a favorite night out across America." },
      { year: "1970s", text: "Color televisions became more common in American homes." },
      { year: "1980s", text: "Arcades were full of people playing Pac-Man and other games." },
      { year: "1950s", text: "Many families gathered around the radio and television every evening." },
      { year: "1960s", text: "More American homes were getting air conditioning and television." }
    ];

    const SAFE_FAMOUS_PEOPLE = [
      "actor", "actress", "singer", "musician", "comedian", "entertainer",
      "television", "movie", "film", "hollywood", "broadway", "baseball",
      "football", "basketball", "olympic", "grammy", "oscar", "artist",
      "boxer", "country", "rock", "pop"
    ];

    const BLOCKED_TERMS = [
      "war", "battle", "massacre", "siege", "invasion", "treaty", "military",
      "politics", "government", "president", "election", "assassination",
      "conflict", "attack", "killed", "execution", "riot", "lunar module",
      "commanded by", "piloted by", "apollo program", "orion"
    ];

    const AMERICAN_FUN_KEYWORDS = [
      "disney", "walmart", "television", "tv", "movie", "music", "radio",
      "opened", "launched", "premiered", "broadway", "record", "hollywood",
      "baseball", "basketball", "football", "store", "florida", "california",
      "america", "american"
    ];

    function setToday() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      document.getElementById("dateInput").value = `${y}-${m}-${day}`;
    }

    function setStatus(msg, warn = false) {
      statusEl.textContent = msg;
      statusEl.className = `mt-5 text-xl font-semibold ${warn ? "text-amber-700" : "text-gray-600"}`;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function normalizeText(text) {
      return String(text || "").replace(/\s+/g, " ").trim();
    }

    function includesBlockedTerm(text) {
      const lower = text.toLowerCase();
      return BLOCKED_TERMS.some(term => lower.includes(term));
    }

    function looksFunCelebrity(text) {
      const lower = text.toLowerCase();
      return SAFE_FAMOUS_PEOPLE.some(term => lower.includes(term));
    }

    function looksAmericanAndSimple(text) {
      const lower = text.toLowerCase();
      if (includesBlockedTerm(lower)) return false;
      if (text.length < 25 || text.length > 140) return false;
      return AMERICAN_FUN_KEYWORDS.some(word => lower.includes(word));
    }

    function simplifyText(text) {
      let clean = normalizeText(text);

      clean = clean.replace(/\s*\([^)]*\)/g, "");
      clean = clean.replace(/\[[^\]]*\]/g, "");
      clean = clean.replace(/;\s*/g, ". ");
      clean = clean.replace(/:\s*/g, ". ");
      clean = clean.replace(/\s{2,}/g, " ").trim();

      if (clean.length > 140) {
        const shorter = clean.split(".")[0].trim();
        if (shorter.length >= 25) clean = shorter + ".";
      }

      return clean;
    }

    function makePriceSlides(mm, dd, count = 4) {
      const pool = [...FUN_PRICE_COMPARISONS];
      const seed = (mm * 100) + dd + 77;
      for (let i = pool.length - 1; i > 0; i--) {
        const j = (seed + i * 13) % (i + 1);
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, count).map(entry => ({
        type: "Then vs Now",
        year: `${entry.thenYear} → Today`,
        text: `${entry.item}: then ${entry.thenCost}, now about ${entry.nowCost}`
      }));
    }

    function makeOfflineSlides(mm, dd) {
      const celebs = [...OFFLINE_CELEBS];
      const remember = [...OFFLINE_REMEMBER_WHEN];

      const seed = (mm * 100) + dd;

      for (let i = celebs.length - 1; i > 0; i--) {
        const j = (seed + i * 7) % (i + 1);
        [celebs[i], celebs[j]] = [celebs[j], celebs[i]];
      }

      for (let i = remember.length - 1; i > 0; i--) {
        const j = (seed + i * 11) % (i + 1);
        [remember[i], remember[j]] = [remember[j], remember[i]];
      }

      const celebSlides = celebs.slice(0, 5).map(item => ({
        type: "Celebrity Spotlight",
        year: item.year,
        text: item.text
      }));

      const rememberSlides = remember.slice(0, 4).map(item => ({
        type: "Remember When",
        year: item.year,
        text: item.text
      }));

      const priceSlides = makePriceSlides(mm, dd, 4);

      const pack = [...celebSlides, ...rememberSlides, ...priceSlides];
      shuffle(pack);
      return pack;
    }

    function renderFilters() {
      const wrap = document.getElementById("filters");
      wrap.innerHTML = "";

      typeMap.list.forEach(t => {
        const b = document.createElement("button");
        b.textContent = t;
        b.className = `px-5 py-3 rounded-xl border text-xl font-extrabold ${
          t === typeMap.selected
            ? "bg-blue-900 text-white border-blue-900"
            : "bg-white text-blue-900 border-blue-300 hover:bg-blue-50"
        }`;

        b.onclick = () => {
          typeMap.selected = t;
          applyFilter();
          renderFilters();
        };

        wrap.appendChild(b);
      });
    }

    function applyFilter() {
      slides = typeMap.selected === "All"
        ? [...allSlides]
        : allSlides.filter(s => s.type === typeMap.selected);

      idx = -1;
      updateProgress();

      if (!slides.length) {
        factTextEl.textContent = "No slides for this section on this date.";
        typeChipEl.textContent = "No Data";
        yearBadgeEl.textContent = "—";
        return;
      }

      nextSlide(true);
    }

    function gradientForType(type) {
      const map = {
        "Celebrity Spotlight": "from-purple-800 via-fuchsia-700 to-pink-700",
        "Remember When": "from-blue-900 via-sky-700 to-cyan-600",
        "Then vs Now": "from-amber-700 via-orange-600 to-rose-600"
      };
      return map[type] || "from-amber-700 via-orange-600 to-rose-600";
    }

    function animateTo(slideData, direction = "next") {
      slideEl.classList.remove("opacity-100", "translate-x-0");
      slideEl.classList.add("opacity-0", direction === "next" ? "-translate-x-8" : "translate-x-8");

      setTimeout(() => {
        factTextEl.textContent = slideData.text;
        yearBadgeEl.textContent = slideData.year;
        typeChipEl.textContent = slideData.type;
        updateProgress();

        stageEl.className = `relative max-w-6xl mx-auto h-[32rem] md:h-[38rem] rounded-[2rem] shadow-2xl overflow-hidden border-[10px] border-white bg-gradient-to-br ${gradientForType(slideData.type)}`;

        slideEl.classList.remove("opacity-0", "-translate-x-8", "translate-x-8");
        slideEl.classList.add("opacity-100", "translate-x-0");
      }, 220);
    }

    function nextSlide(initial = false) {
      if (!slides.length) return;
      idx = (idx + 1) % slides.length;
      animateTo(slides[idx], "next");
      if (!initial) restartAutoIfNeeded();
    }

    function prevSlide() {
      if (!slides.length) return;
      idx = (idx - 1 + slides.length) % slides.length;
      animateTo(slides[idx], "prev");
      restartAutoIfNeeded();
    }

    function shuffleSlides() {
      if (!slides.length) return;
      shuffle(slides);
      idx = -1;
      nextSlide(true);
      setStatus("Slides shuffled.");
    }

    function updateProgress() {
      progressEl.textContent = slides.length ? `${idx + 1} / ${slides.length}` : "0 / 0";
    }

    function toggleAuto() {
      autoOn = !autoOn;
      autoBtn.textContent = `Auto: ${autoOn ? "On" : "Off"}`;

      if (autoOn) {
        if (idx === -1 && slides.length) nextSlide(true);
        startAuto();
      } else {
        stopAuto();
      }
    }

    function startAuto() {
      stopAuto();
      timer = setInterval(() => nextSlide(true), AUTO_SECONDS * 1000);
      setStatus(`Auto slideshow on (${AUTO_SECONDS}s per slide).`);
    }

    function stopAuto() {
      if (timer) clearInterval(timer);
      timer = null;
      setStatus("Auto slideshow off.");
    }

    function restartAutoIfNeeded() {
      if (autoOn) startAuto();
    }

    async function loadSlides() {
      const dateValue = document.getElementById("dateInput").value;
      if (!dateValue) {
        setStatus("Please choose a date.", true);
        return;
      }

      const [y, m, d] = dateValue.split("-");
      const mm = Number(m);
      const dd = Number(d);

      slideDateEl.textContent = `Date: ${y}-${m}-${d}`;
      setStatus("Loading coffee-time slides...");
      factTextEl.textContent = "Loading...";
      yearBadgeEl.textContent = "—";
      typeChipEl.textContent = "Loading";

      try {
        const urls = {
          births: `https://en.wikipedia.org/api/rest_v1/feed/onthisday/births/${mm}/${dd}`,
          deaths: `https://en.wikipedia.org/api/rest_v1/feed/onthisday/deaths/${mm}/${dd}`,
          events: `https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/${mm}/${dd}`
        };

        const [birthsRes, deathsRes, eventsRes] = await Promise.all([
          fetch(urls.births),
          fetch(urls.deaths),
          fetch(urls.events)
        ]);

        if (!birthsRes.ok || !deathsRes.ok || !eventsRes.ok) {
          throw new Error("Source fetch failed");
        }

        const [birthsData, deathsData, eventsData] = await Promise.all([
          birthsRes.json(),
          deathsRes.json(),
          eventsRes.json()
        ]);

        const celebSlides = [];

        for (const item of (birthsData.births || [])) {
          let text = simplifyText(item.text || item.description || "");
          if (!text) continue;
          if (includesBlockedTerm(text)) continue;
          if (!looksFunCelebrity(text)) continue;

          celebSlides.push({
            type: "Celebrity Spotlight",
            year: item.year || "—",
            text
          });
        }

        for (const item of (deathsData.deaths || [])) {
          let text = simplifyText(item.text || item.description || "");
          if (!text) continue;
          if (includesBlockedTerm(text)) continue;
          if (!looksFunCelebrity(text)) continue;

          celebSlides.push({
            type: "Celebrity Spotlight",
            year: item.year || "—",
            text
          });
        }

        const rememberSlides = [];

        for (const item of (eventsData.events || [])) {
          let text = simplifyText(item.text || item.description || "");
          if (!text) continue;
          if (!looksAmericanAndSimple(text)) continue;

          rememberSlides.push({
            type: "Remember When",
            year: item.year || "—",
            text
          });
        }

        const uniqueCelebs = [];
        const seenCelebs = new Set();
        for (const slide of celebSlides) {
          const key = slide.text.toLowerCase();
          if (seenCelebs.has(key)) continue;
          seenCelebs.add(key);
          uniqueCelebs.push(slide);
        }

        const uniqueRemember = [];
        const seenRemember = new Set();
        for (const slide of rememberSlides) {
          const key = slide.text.toLowerCase();
          if (seenRemember.has(key)) continue;
          seenRemember.add(key);
          uniqueRemember.push(slide);
        }

        shuffle(uniqueCelebs);
        shuffle(uniqueRemember);

        const priceSlides = makePriceSlides(mm, dd, 4);

        allSlides = [
          ...uniqueCelebs.slice(0, 5),
          ...uniqueRemember.slice(0, 4),
          ...priceSlides
        ];

        if (allSlides.length < 7) {
          allSlides = makeOfflineSlides(mm, dd);
          setStatus("Using built-in American fun facts for a better coffee-time slideshow.", true);
        } else {
          shuffle(allSlides);
          setStatus(`Loaded ${allSlides.length} slides for ${y}-${m}-${d}.`);
        }

        applyFilter();

        if (autoOn) startAuto();
      } catch (error) {
        console.error(error);
        allSlides = makeOfflineSlides(mm, dd);
        applyFilter();
        setStatus("Could not reach the online source. Showing built-in American fun facts instead.", true);

        if (autoOn) startAuto();
      }
    }

    async function enterFullscreen() {
      const docEl = document.documentElement;
      if (docEl.requestFullscreen) {
        await docEl.requestFullscreen();
      }
    }

    document.getElementById("loadBtn").addEventListener("click", loadSlides);
    document.getElementById("nextBtn").addEventListener("click", nextSlide);
    document.getElementById("prevBtn").addEventListener("click", prevSlide);
    document.getElementById("shuffleBtn").addEventListener("click", shuffleSlides);
    document.getElementById("autoBtn").addEventListener("click", toggleAuto);
    document.getElementById("fullscreenBtn").addEventListener("click", enterFullscreen);

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") nextSlide();
      if (e.key === "ArrowLeft") prevSlide();
      if (e.key.toLowerCase() === " ") {
        e.preventDefault();
        toggleAuto();
      }
      if (e.key.toLowerCase() === "f") {
        enterFullscreen();
      }
    });

    setToday();
    renderFilters();
    slideDateEl.textContent = `Date: ${document.getElementById("dateInput").value}`;
    loadSlides();
  </script>
</body>
</html>
