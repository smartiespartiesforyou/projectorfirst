<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>On This Day Slideshow</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Memberstack Loader -->
  <script
    data-memberstack-app="app_cmgnwpg8y00x10suih4pua785"
    src="https://static.memberstack.com/scripts/v2/memberstack.js"
    type="text/javascript"></script>

  <!-- Protect this page -->
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const member = await window.$memberstackDom.getCurrentMember();
        if (!member.data) window.location.href = "/subscribe.html";
      } catch {
        window.location.href = "/subscribe.html";
      }
    });
  </script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-900">
  <div class="max-w-7xl mx-auto p-6 text-center">
    <h1 class="text-5xl md:text-6xl font-extrabold text-blue-900 mb-4">On This Day — Slideshow</h1>

    <div class="flex justify-center mb-6">
      <a href="apps.html"
         class="inline-flex items-center gap-2 px-8 py-4 bg-blue-900 text-white rounded-2xl font-extrabold text-2xl shadow hover:bg-blue-800">
        ← Back to Apps
      </a>
    </div>

    <!-- Controls -->
    <div class="flex flex-wrap justify-center items-center gap-4 mb-6">
      <input id="dateInput" type="date"
             class="text-2xl px-4 py-3 border-4 border-blue-200 rounded-xl font-bold bg-white" />
      <button id="loadBtn"
              class="bg-blue-600 hover:bg-blue-800 text-white text-2xl py-3 px-6 rounded-2xl shadow-lg">
        Load Slides
      </button>
      <button id="autoBtn"
              class="bg-emerald-600 hover:bg-emerald-700 text-white text-2xl py-3 px-6 rounded-2xl shadow-lg">
        Auto: Off
      </button>
    </div>

    <!-- Type filters -->
    <div id="filters" class="flex flex-wrap justify-center gap-3 mb-6"></div>

    <!-- Slide stage -->
    <div class="relative max-w-6xl mx-auto h-[30rem] md:h-[34rem] rounded-[2rem] shadow-2xl overflow-hidden border-[10px] border-white bg-gradient-to-br from-blue-900 via-blue-700 to-indigo-700">
      <div id="slide"
           class="absolute inset-0 p-8 md:p-12 flex flex-col justify-between text-white transition-all duration-500 opacity-100 translate-x-0">
        <div class="flex justify-between items-start gap-4">
          <div id="typeChip"
               class="inline-block px-5 py-2 rounded-full text-xl md:text-2xl font-extrabold bg-white/20 backdrop-blur">
            Event
          </div>
          <div id="yearBadge"
               class="inline-block px-6 py-3 rounded-2xl text-3xl md:text-4xl font-black bg-yellow-300 text-blue-950 shadow-lg">
            1900
          </div>
        </div>

        <div class="flex-1 flex items-center justify-center px-2">
          <p id="factText"
             class="text-[2rem] md:text-[2.7rem] leading-tight font-extrabold max-w-5xl">
            Press "Load Slides" to begin.
          </p>
        </div>

        <div class="flex justify-between items-center text-lg md:text-2xl font-bold">
          <span id="slideDate">Date: —</span>
          <span id="progress">0 / 0</span>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <div class="flex flex-wrap justify-center gap-4 mt-8">
      <button id="prevBtn" class="bg-white border-4 border-blue-900 text-blue-900 text-2xl py-3 px-6 rounded-2xl shadow-lg hover:bg-gray-50">
        ◀ Previous
      </button>
      <button id="nextBtn" class="bg-blue-600 hover:bg-blue-800 text-white text-2xl py-3 px-6 rounded-2xl shadow-lg">
        Next ▶
      </button>
      <button id="shuffleBtn" class="bg-white border-4 border-blue-900 text-blue-900 text-2xl py-3 px-6 rounded-2xl shadow-lg hover:bg-gray-50">
        Shuffle
      </button>
    </div>

    <p id="status" class="mt-5 text-xl font-semibold text-gray-600">Ready.</p>
  </div>

  <script>
    const typeMap = {
      selected: "All",
      list: ["All", "Events", "Births", "Deaths", "Holidays"],
      keys: { Events: "events", Births: "births", Deaths: "deaths", Holidays: "holidays" }
    };

    let allSlides = [];
    let slides = [];
    let idx = -1;
    let autoOn = false;
    let timer = null;
    const AUTO_SECONDS = 10;

    const slideEl = document.getElementById("slide");
    const factTextEl = document.getElementById("factText");
    const yearBadgeEl = document.getElementById("yearBadge");
    const typeChipEl = document.getElementById("typeChip");
    const progressEl = document.getElementById("progress");
    const slideDateEl = document.getElementById("slideDate");
    const statusEl = document.getElementById("status");
    const autoBtn = document.getElementById("autoBtn");

    function setToday() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      document.getElementById("dateInput").value = `${y}-${m}-${day}`;
    }

    function setStatus(msg, warn = false) {
      statusEl.textContent = msg;
      statusEl.className = `mt-5 text-xl font-semibold ${warn ? "text-amber-700" : "text-gray-600"}`;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function renderFilters() {
      const wrap = document.getElementById("filters");
      wrap.innerHTML = "";
      typeMap.list.forEach(t => {
        const b = document.createElement("button");
        b.textContent = t;
        b.className = `px-5 py-3 rounded-xl border text-xl font-extrabold ${
          t === typeMap.selected
            ? "bg-blue-900 text-white border-blue-900"
            : "bg-white text-blue-900 border-blue-300 hover:bg-blue-50"
        }`;
        b.onclick = () => {
          typeMap.selected = t;
          applyFilter();
          renderFilters();
        };
        wrap.appendChild(b);
      });
    }

    function normalize(type, item) {
      let text = item.text || "";
      if (!text && item.pages?.[0]?.titles?.normalized) text = item.pages[0].titles.normalized;
      return { type, year: item.year || "—", text: text || "No details available." };
    }

    function applyFilter() {
      slides = typeMap.selected === "All"
        ? [...allSlides]
        : allSlides.filter(s => s.type === typeMap.selected);

      idx = -1;
      updateProgress();

      if (!slides.length) {
        factTextEl.textContent = "No slides for this filter/date.";
        typeChipEl.textContent = "No Data";
        yearBadgeEl.textContent = "—";
        return;
      }
      nextSlide(true);
    }

    function gradientForType(type) {
      const map = {
        Events: "from-blue-900 via-blue-700 to-indigo-700",
        Births: "from-emerald-900 via-emerald-700 to-teal-700",
        Deaths: "from-slate-900 via-slate-700 to-gray-700",
        Holidays: "from-purple-900 via-fuchsia-700 to-pink-700"
      };
      return map[type] || "from-blue-900 via-blue-700 to-indigo-700";
    }

    function animateTo(slideData, direction = "next") {
      // Exit
      slideEl.classList.remove("opacity-100", "translate-x-0");
      slideEl.classList.add("opacity-0", direction === "next" ? "-translate-x-8" : "translate-x-8");

      setTimeout(() => {
        // Update content
        factTextEl.textContent = slideData.text;
        yearBadgeEl.textContent = slideData.year;
        typeChipEl.textContent = slideData.type;
        updateProgress();

        // Update background gradient
        const stage = slideEl.parentElement;
        stage.className = `relative max-w-6xl mx-auto h-[30rem] md:h-[34rem] rounded-[2rem] shadow-2xl overflow-hidden border-[10px] border-white bg-gradient-to-br ${gradientForType(slideData.type)}`;

        // Enter
        slideEl.classList.remove("opacity-0", "-translate-x-8", "translate-x-8");
        slideEl.classList.add("opacity-100", "translate-x-0");
      }, 220);
    }

    function nextSlide(initial = false) {
      if (!slides.length) return;
      idx = (idx + 1) % slides.length;
      animateTo(slides[idx], "next");
      if (!initial) restartAutoIfNeeded();
    }

    function prevSlide() {
      if (!slides.length) return;
      idx = (idx - 1 + slides.length) % slides.length;
      animateTo(slides[idx], "prev");
      restartAutoIfNeeded();
    }

    function shuffleSlides() {
      if (!slides.length) return;
      shuffle(slides);
      idx = -1;
      nextSlide(true);
      setStatus("Slides shuffled.");
    }

    function updateProgress() {
      progressEl.textContent = slides.length ? `${idx + 1} / ${slides.length}` : "0 / 0";
    }

    function toggleAuto() {
      autoOn = !autoOn;
      autoBtn.textContent = `Auto: ${autoOn ? "On" : "Off"}`;
      if (autoOn) {
        if (idx === -1 && slides.length) nextSlide(true);
        startAuto();
      } else stopAuto();
    }

    function startAuto() {
      stopAuto();
      timer = setInterval(() => nextSlide(true), AUTO_SECONDS * 1000);
      setStatus(`Auto slideshow on (${AUTO_SECONDS}s per slide).`);
    }

    function stopAuto() {
      if (timer) clearInterval(timer);
      timer = null;
      setStatus("Auto slideshow off.");
    }

    function restartAutoIfNeeded() {
      if (autoOn) startAuto();
    }

    async function loadSlides() {
      const dateValue = document.getElementById("dateInput").value;
      if (!dateValue) return setStatus("Please choose a date.", true);

      const [y, m, d] = dateValue.split("-");
      slideDateEl.textContent = `Date: ${y}-${m}-${d}`;
      setStatus("Loading slides...");
      factTextEl.textContent = "Loading...";
      yearBadgeEl.textContent = "—";
      typeChipEl.textContent = "Loading";

      const url = `https://api.wikimedia.org/feed/v1/wikipedia/en/onthisday/all/${Number(m)}/${Number(d)}`;

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error("fetch failed");
        const data = await res.json();

        const collected = [];
        Object.entries(typeMap.keys).forEach(([label, key]) => {
          const arr = Array.isArray(data[key]) ? data[key] : [];
          arr.forEach(item => collected.push(normalize(label, item)));
        });

        allSlides = collected.filter(s => s.text && s.text.length > 25);
        shuffle(allSlides);

        if (!allSlides.length) {
          setStatus("No facts available for that date.", true);
          return;
        }

        applyFilter();
        setStatus(`Loaded ${allSlides.length} slides for ${y}-${m}-${d}.`);
      } catch (e) {
        setStatus("Could not load history slides. Check internet and try again.", true);
        factTextEl.textContent = "Unable to load data right now.";
        typeChipEl.textContent = "Error";
        yearBadgeEl.textContent = "—";
      }
    }

    // Events
    document.getElementById("loadBtn").addEventListener("click", loadSlides);
    document.getElementById("nextBtn").addEventListener("click", nextSlide);
    document.getElementById("prevBtn").addEventListener("click", prevSlide);
    document.getElementById("shuffleBtn").addEventListener("click", shuffleSlides);
    document.getElementById("autoBtn").addEventListener("click", toggleAuto);

    // Keyboard support
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") nextSlide();
      if (e.key === "ArrowLeft") prevSlide();
      if (e.key.toLowerCase() === " ") { e.preventDefault(); toggleAuto(); }
    });

    // Init
    setToday();
    renderFilters();
    slideDateEl.textContent = `Date: ${document.getElementById("dateInput").value}`;
  </script>
</body>
</html>
