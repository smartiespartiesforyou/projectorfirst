<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Classic Bingo Caller — ProjectorFirst</title>

<!-- Membership gate (paywall-test) -->

  data-memberstack-app="app_cmgnwpg8y00x10suih4pua785"

<script src="/guard.js"></script>

<meta name="description" content="High-contrast bingo caller with large letters and optional voice for senior care."/>
  <meta name="theme-color" content="#1e3a8a"/>
  <link rel="icon" href="/logo.svg" type="image/svg+xml"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body { height: 100%; }
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      /* dvh = the space Safari's toolbar ACTUALLY leaves us on iPad */
      min-height: 100vh;
      min-height: 100dvh;
      max-height: 100dvh;
      padding: 0.75rem 1rem;
      overflow: hidden;
    }

    /* ---- Compact one-row header: nav / title / game style ---- */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    .topbar h1 {
      font-size: clamp(1.4rem, 3vmin, 2.2rem);
      font-weight: 800;
      color: #1e3a8a;
      white-space: nowrap;
    }
    .back-btn {
      background: #1e3a8a;
      color: #fff;
      font-weight: 700;
      font-size: clamp(1rem, 2vmin, 1.25rem);
      padding: 0.6rem 1.2rem;
      border-radius: 0.75rem;
      white-space: nowrap;
    }
    .back-btn:hover { background: #1e40af; }
    #themeGame {
      border: 2px solid #1e3a8a;
      font-size: clamp(1rem, 2vmin, 1.25rem);
      border-radius: 0.75rem;
      padding: 0.5rem;
      font-weight: 600;
      color: #1e3a8a;
      background: #fff;
    }

    /* ---- Main stage: controls + caller box, sized to leave room for the tray ---- */
    .stage {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(1rem, 3vw, 2.5rem);
    }
    .caller-box {
      /* square box that NEVER pushes the tray off screen:
         capped by width AND by remaining height */
      width: min(58vw, calc(100dvh - 15rem), 600px);
      aspect-ratio: 1 / 1;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 1.25rem;
      font-weight: 900;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
      user-select: none;
    }
    .caller-number {
      /* font-size is set by fitCaller() in JS so "G 46" always fits on ONE line */
      white-space: nowrap;
      letter-spacing: 0.05em;
      line-height: 0.9;
    }
    .caller-emoji {
      font-size: clamp(2rem, 6vmin, 4rem);
      margin-top: 0.5rem;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .btn {
      font-size: clamp(1.2rem, 2.4vmin, 1.75rem);
      font-weight: bold;
      padding: clamp(0.8rem, 1.8vmin, 1.25rem) clamp(1.2rem, 3vmin, 2.5rem);
      border-radius: 1rem;
      cursor: pointer;
      min-width: clamp(140px, 16vw, 200px);
      transition: transform 0.1s;
    }
    .btn:hover { transform: scale(1.05); }
    .btn:focus-visible { outline: 4px solid #facc15; outline-offset: 2px; }
    .btn-next { background: #1e3a8a; color: #fff; }
    .btn-fullscreen { background: #7c3aed; color: #fff; }
    .btn-reset { background: #dc2626; color: #fff; }
    .btn-sound { background: #fff; color: #1e3a8a; border: 2px solid #1e3a8a; }

    /* ---- Ball tray: pinned at the bottom, newest first, always visible ---- */
    .tray-wrap {
      flex: 0 0 auto;
      margin-top: 0.5rem;
      border-top: 3px solid #e2e8f0;
      padding-top: 0.5rem;
    }
    .tray-label {
      font-size: clamp(0.9rem, 1.8vmin, 1.1rem);
      font-weight: 700;
      color: #475569;
      text-align: left;
      margin-bottom: 0.25rem;
    }
    .recent-calls {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 0.4rem;
      -webkit-overflow-scrolling: touch;
    }
    .recent-calls span {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(56px, 8vmin, 88px);
      height: clamp(56px, 8vmin, 88px);
      border-radius: 50%;
      color: #fff;
      font-size: clamp(1.3rem, 3vmin, 2rem);
      font-weight: bold;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
    }
    /* newest ball stands out */
    .recent-calls span:first-child {
      outline: 4px solid #facc15;
      outline-offset: 2px;
    }
    .ball-B { background: #1e3a8a; }
    .ball-I { background: #dc2626; }
    .ball-N { background: #16a34a; }
    .ball-G { background: #f97316; }
    .ball-O { background: #7c3aed; }

    /* ---- Narrow screens (iPad portrait / phones): stack, keep tray visible ---- */
    @media (max-width: 820px) {
      .stage { flex-direction: column; gap: 0.75rem; }
      .caller-box { width: min(88vw, calc(100dvh - 21rem)); }
      .controls { flex-direction: row; flex-wrap: wrap; justify-content: center; }
      .topbar { justify-content: center; }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <a href="apps.html" class="back-btn">← Back to Apps</a>
    <h1>🎉 Classic Bingo Caller</h1>
    <select id="themeGame" aria-label="Game style">
      <option value="classic-75">Classic 🇺🇸 (1–75)</option>
      <option value="halloween-75">Halloween 🎃 (1–75)</option>
      <option value="christmas-75">Christmas 🎄 (1–75)</option>
      <option value="easter-75">Easter 🐣 (1–75)</option>
      <option value="valentines-75">Valentine’s 💘 (1–75)</option>
      <option value="patriotic-75">Patriotic ⭐ (1–75)</option>
      <option value="classic-90">UK 🇬🇧 (1–90)</option>
      <option value="classic-100">Extended 💫 (1–100)</option>
    </select>
  </div>

  <div class="stage">
    <div class="controls">
      <button id="nextBtn" class="btn btn-next">Call Next</button>
      <button id="fsBtn" class="btn btn-fullscreen">Fullscreen</button>
    </div>

    <div id="callerBox" class="caller-box">
      <div id="callerText" class="caller-number">—</div>
      <div id="callerEmoji" class="caller-emoji"></div>
    </div>

    <div class="controls">
      <button id="resetBtn" class="btn btn-reset">Reset</button>
      <button id="soundBtn" class="btn btn-sound">🔊 Sound</button>
    </div>
  </div>

  <div class="tray-wrap">
    <div class="tray-label">Called so far: <span id="callCount">0</span> <span style="font-weight:500">(newest first)</span></div>
    <div id="recentCalls" class="recent-calls"></div>
  </div>

  <script>
    const letters = ["B","I","N","G","O"];
    const ranges = [[1,15],[16,30],[31,45],[46,60],[61,75]];
    let pool = [], history = [], soundOn = true, currentTheme = "classic";

    const callerText = document.getElementById("callerText");
    const callerEmoji = document.getElementById("callerEmoji");
    const recentDiv = document.getElementById("recentCalls");
    const themeGameSel = document.getElementById("themeGame");
    const callCount = document.getElementById("callCount");

    const THEMES = {
      classic: { emoji: "" },
      halloween: { emoji: "🎃" },
      christmas: { emoji: "🎄" },
      easter: { emoji: "🐣" },
      valentines: { emoji: "💘" },
      patriotic: { emoji: "⭐" }
    };

    function initGame() {
      pool = [];
      history = [];

      const [theme, size] = themeGameSel.value.split("-");
      const maxNum = parseInt(size);
      currentTheme = theme;

      if (maxNum === 75) {
        for (let i = 0; i < letters.length; i++) {
          const [min, max] = ranges[i];
          for (let n = min; n <= max; n++) {
            pool.push({ letter: letters[i], number: n });
          }
        }
      } else {
        for (let n = 1; n <= maxNum; n++) {
          pool.push({ letter: "", number: n });
        }
      }

      shuffle(pool);
      callerText.textContent = "—";
      callerEmoji.textContent = "";
      recentDiv.innerHTML = "";
      callCount.textContent = "0";
      fitCaller();
    }

    function shuffle(arr) {
      const randomValues = new Uint32Array(arr.length);
      crypto.getRandomValues(randomValues);
      for (let i = arr.length - 1; i > 0; i--) {
        const j = randomValues[i] % (i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function callNext() {
      if (pool.length === 0) return;
      const pick = pool.pop();
      history.push(pick);
      const emoji = THEMES[currentTheme]?.emoji || "";
      callerText.textContent = pick.letter ? `${pick.letter} ${pick.number}` : `${pick.number}`;
      callerEmoji.textContent = emoji;
      fitCaller();
      addRecent(pick);
      callCount.textContent = history.length;
      if (soundOn) speak(pick.letter ? `${pick.letter} ${pick.number}` : `${pick.number}`);
    }

    function addRecent(call) {
      const el = document.createElement("span");
      el.textContent = call.letter ? `${call.letter} ${call.number}` : `${call.number}`;
      el.className = call.letter ? `ball-${call.letter}` : "ball-B";
      /* newest first, so the latest calls are always in view without scrolling */
      recentDiv.prepend(el);
      recentDiv.scrollLeft = 0;
      if (recentDiv.children.length > 100) recentDiv.lastChild.remove();
    }

    function resetGame() { initGame(); }

    function toggleSound() {
      soundOn = !soundOn;
      document.getElementById("soundBtn").textContent = soundOn ? "🔊 Sound" : "🔇 Muted";
      if (!soundOn) speechSynthesis.cancel();
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }

    function speak(text) {
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 1.0;
      speechSynthesis.speak(utter);
    }

    /* Scale the call text to the box so it's as big as possible
       while ALWAYS fitting on one line (fixes "G / 46" stacking). */
    function fitCaller() {
      const box = document.getElementById("callerBox");
      const text = callerText.textContent || "—";
      // start from a generous guess, then shrink until it truly fits
      let size = Math.min(box.clientHeight * 0.62,
                          (box.clientWidth * 0.92) / (0.62 * Math.max(text.length, 1)));
      callerText.style.fontSize = size + "px";
      let guard = 20;
      while (callerText.scrollWidth > box.clientWidth * 0.94 && guard-- > 0) {
        size *= 0.94;
        callerText.style.fontSize = size + "px";
      }
    }

    window.addEventListener("resize", fitCaller);
    document.addEventListener("fullscreenchange", fitCaller);

    document.getElementById("nextBtn").addEventListener("click", callNext);
    document.getElementById("resetBtn").addEventListener("click", resetGame);
    document.getElementById("soundBtn").addEventListener("click", toggleSound);
    document.getElementById("fsBtn").addEventListener("click", toggleFullscreen);
    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") { e.preventDefault(); callNext(); }
      if (e.code === "KeyR") resetGame();
      if (e.code === "KeyF") toggleFullscreen();
      if (e.code === "KeyS") toggleSound();
    });

    themeGameSel.addEventListener("change", initGame);
    initGame();
  </script>
</body>
</html>
