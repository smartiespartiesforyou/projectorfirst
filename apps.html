<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>ProjectorFirst Apps: Bingo, Trivia, Games for Seniors</title>
  <meta name="description" content="Explore 15+ big, simple apps for seniors: Bingo, Pokeno, Trivia, and movement games. Perfect for nursing homes and group activities." />

  <script
    data-memberstack-app="app_cmgnwpg8y00x10suih4pua785"
    src="https://static.memberstack.com/scripts/v2/memberstack.js"
    type="text/javascript">
  </script>

  <script>
  document.addEventListener("DOMContentLoaded", async () => {
    const waitForMemberstack = () =>
      new Promise((resolve) => {
        const check = () => {
          if (window.$memberstackDom) resolve(window.$memberstackDom);
          else setTimeout(check, 100);
        };
        check();
      });

    const memberstack = await waitForMemberstack();

    try {
      const { data: member } = await memberstack.getCurrentMember();

      if (!member) {
        window.location.replace("index.html");
        return;
      }

      const hasActivePlan = Array.isArray(member.planConnections) &&
        member.planConnections.some(plan => 
          plan.status === "ACTIVE" || plan.planId === "pln_trial30-gpte0tfl"
        );

      if (!hasActivePlan) {
        window.location.replace("checkout.html");
        return;
      }

      console.log("✅ Access granted to:", member.auth.email);
    } catch (error) {
      console.error("Auth check failed:", error);
      window.location.replace("index.html");
    }
  });
  </script>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background:#fff; color:#111; }
    .card {
      border:3px solid #1e3a8a; border-radius:1.25rem; padding:1.25rem;
      background:#fff; box-shadow:0 6px 0 #1e3a8a22;
      transition:transform .08s ease, box-shadow .08s ease;
      display:flex; flex-direction:column; justify-content:space-between; min-height: 250px;
    }
    .card:hover { transform:translateY(-2px); box-shadow:0 10px 0 #1e3a8a22; }
    .btn {
      display:inline-block; background:#1e3a8a; color:#fff; padding:.9rem 1.4rem;
      border-radius:1rem; font-weight:800; font-size:1.2rem; text-align:center;
    }
    .btn:hover { background:#1d4ed8; }
  </style>
</head>

<body class="min-h-screen">

<header class="max-w-5xl mx-auto px-4 py-6">
  <h1 class="text-4xl md:text-5xl font-extrabold text-blue-800 mb-2">
    On This Day in History
  </h1>
  <p class="text-lg text-gray-700">
    Big, simple, readable history moments for group discussion.
  </p>
</header>

<main class="max-w-5xl mx-auto px-4 pb-12">

  <div class="card text-center">
    <div>
      <div class="text-5xl mb-4">📜</div>
      <h2 id="todayDate" class="text-3xl font-extrabold text-blue-800 mb-3"></h2>
      <p id="historyFact" class="text-xl text-gray-800"></p>
    </div>
    <button onclick="loadHistory()" class="btn mt-6">Show Another</button>
  </div>

</main>

<footer class="max-w-5xl mx-auto px-4 pb-10 pt-4 text-center text-gray-500">
  <a href="index.html" class="underline text-blue-700 font-semibold">Back to Home</a>
</footer>

<script>
const historyData = [
  "1775 – The American Revolution begins with the Battles of Lexington and Concord.",
  "1865 – Abraham Lincoln dies after being shot the night before.",
  "1912 – The Titanic sinks in the Atlantic Ocean.",
  "1945 – World War II: The U.S. Army liberates Dachau concentration camp.",
  "1969 – Apollo 11 launches toward the moon.",
  "1986 – The Chernobyl nuclear disaster occurs.",
  "2001 – Wikipedia is launched."
];

function getTodayDate() {
  const today = new Date();
  return today.toLocaleDateString(undefined, {
    month: 'long',
    day: 'numeric'
  });
}

function loadHistory() {
  const random = historyData[Math.floor(Math.random() * historyData.length)];
  document.getElementById("historyFact").textContent = random;
}

document.getElementById("todayDate").textContent = getTodayDate();
loadHistory();
</script>

</body>
</html>
