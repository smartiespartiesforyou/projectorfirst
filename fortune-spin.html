  <style>
    html, body {
      height: 100vh;
      height: 100dvh;
      margin: 0;
      overflow: hidden;

    }
    .cat-btn {
      background: #fff;

      font-weight: 900;

      border-radius: 1.5rem;
      box-shadow: 0 8px 0 #b45309;
      transition: transform .08s ease, box-shadow .08s ease;
      cursor: pointer;
      touch-action: manipulation;

    .cat-btn:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #b45309;
    }
    /* Letter tiles on the puzzle board */
    .word {
      display: inline-flex;
      gap: .3rem;
      margin: .25rem .5rem;
    }
    .tile {
      width: clamp(2rem, 6.2vw, 4.2rem);
      height: clamp(2.7rem, 8vw, 5.4rem);
      background: #fff;
      border: 3px solid #0f265f;
      border-radius: .5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: #1e3a8a;
      font-size: clamp(1.5rem, 4.8vw, 3.2rem);
      transition: background .3s ease, transform .3s ease;
    }
    .tile.hidden-letter { color: transparent; background: #93c5fd; }
    .tile.just-revealed {
      background: #facc15;
      animation: flip .5s ease;
    }
    .tile.punct { background: transparent; border-color: transparent; color: #fff; }
    @keyframes flip {
      0% { transform: rotateX(90deg); }
      100% { transform: rotateX(0deg); }
    }
    /* Alphabet buttons */
    .letter-btn {
      width: clamp(2.5rem, 7vw, 4rem);
      height: clamp(2.5rem, 7vw, 4rem);
      background: #fff;
      color: #1e3a8a;
      font-weight: 900;
      font-size: clamp(1.2rem, 3.6vw, 2rem);
      border: 3px solid #0f265f;
      border-radius: .75rem;
      box-shadow: 0 4px 0 #0f265f;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform .06s ease;
    }
    .letter-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #0f265f; }
    .letter-btn:disabled {
      background: #475f9e;
      color: #1e3a8a;
      border-color: #33507f;
      box-shadow: none;
      cursor: default;
      opacity: .55;

    .letter-btn.was-correct:disabled { background: #facc15; opacity: .9; color: #1e3a8a; }
    /* Wheel */
    #wheelSvg { transition: transform 4s cubic-bezier(.15,.6,.15,1); }
    .solve-banner {
      background: #facc15;
      color: #1e3a8a;
      border: 6px solid #fff;
      border-radius: 1.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,.4);
      animation: popIn .45s cubic-bezier(.2,1.6,.4,1) both;
    }
    @keyframes popIn {
      0% { transform: scale(.3); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .confetti {
      position: fixed;
      top: -20px;
      pointer-events: none;
      z-index: 50;
      font-size: clamp(1.2rem, 3vw, 2rem);
      animation: fall linear forwards;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: .9; }
    }
    @media (prefers-reduced-motion: reduce) {
      .solve-banner { animation: none; }
      .confetti { display: none; }
      .tile.just-revealed { animation: none; }
      #wheelSvg { transition: none; }
    }

<body>

<script>
// ============ PHRASES: 100 easy, familiar phrases ============
const PHRASES = {
  sayings: [
    "HOME SWEET HOME", "EASY AS PIE", "THE MORE THE MERRIER", "BETTER LATE THAN NEVER",
    "PRACTICE MAKES PERFECT", "GOOD AS GOLD", "HAPPY AS A CLAM", "SAFE AND SOUND",
    "LOVE AT FIRST SIGHT", "TIME FLIES", "SWEET DREAMS", "RISE AND SHINE",
    "A PIECE OF CAKE", "SAVED BY THE BELL", "THE APPLE OF MY EYE", "BIRDS OF A FEATHER",
    "FIT AS A FIDDLE", "SNUG AS A BUG IN A RUG", "PENNY FOR YOUR THOUGHTS", "HOME IS WHERE THE HEART IS",
  ],
  songs: [
    "SOMEWHERE OVER THE RAINBOW", "TAKE ME OUT TO THE BALL GAME", "YOU ARE MY SUNSHINE",
    "MOON RIVER", "JINGLE BELLS", "AMAZING GRACE", "HOME ON THE RANGE", "OH SUSANNA",
    "WHEN THE SAINTS GO MARCHING IN", "LET ME CALL YOU SWEETHEART", "A BICYCLE BUILT FOR TWO",
    "SHINE ON HARVEST MOON", "MY WILD IRISH ROSE", "DANNY BOY", "SWING LOW SWEET CHARIOT",
    "SILENT NIGHT", "AMERICA THE BEAUTIFUL", "MY BONNIE LIES OVER THE OCEAN",
    "DOWN BY THE OLD MILL STREAM", "IN THE GOOD OLD SUMMERTIME",
  ],
  house: [
    "ROCKING CHAIR", "KITCHEN TABLE", "FRONT PORCH SWING", "CUP OF COFFEE",
    "SUNDAY NEWSPAPER", "PHOTO ALBUM", "SEWING MACHINE", "GARDEN HOSE",
    "SCREEN DOOR", "COOKIE JAR", "TELEVISION SET", "READING GLASSES",
    "WELCOME MAT", "PICKET FENCE", "CLOTHESLINE", "RECORD PLAYER",
    "ALARM CLOCK", "FLOWER GARDEN", "BIRD FEEDER", "COMFY SLIPPERS",
  ],
  food: [
    "APPLE PIE", "FRIED CHICKEN", "MASHED POTATOES", "CHICKEN NOODLE SOUP",
    "PEANUT BUTTER AND JELLY", "ICE CREAM SUNDAE", "CHOCOLATE CHIP COOKIES", "SUNDAY POT ROAST",
    "BISCUITS AND GRAVY", "LEMONADE STAND", "BANANA SPLIT", "CORN ON THE COB",
    "GRILLED CHEESE SANDWICH", "PUMPKIN PIE", "SWEET TEA", "DEVILED EGGS",
    "MACARONI AND CHEESE", "HOMEMADE BREAD", "STRAWBERRY SHORTCAKE", "HOT APPLE CIDER",
  ],
  holidays: [
    "MERRY CHRISTMAS", "HAPPY NEW YEAR", "TRICK OR TREAT", "EASTER EGG HUNT",
    "FOURTH OF JULY", "THANKSGIVING TURKEY", "CHRISTMAS CAROLS", "SNOW DAY",
    "SPRING CLEANING", "SUMMER VACATION", "AUTUMN LEAVES", "FIREWORKS SHOW",
    "CANDY CANES", "COUNTY FAIR", "FIRST DAY OF SPRING", "WINTER WONDERLAND",
    "HARVEST MOON", "PUMPKIN PATCH", "MISTLETOE AND HOLLY", "NEW YEARS EVE",
  ],
};

const CATEGORY_NAMES = {
  sayings: "💬 Old Sayings",
  songs: "🎵 Songs We Know",
  house: "🏠 Around the House",
  food: "🍎 Food & Cooking",
  holidays: "🎄 Holidays & Seasons",
  all: "🎲 Mix of Everything",
};

// Wheel wedges — all positive, no Bankrupt here!
const WEDGES = [
  { label: "100", value: 100, color: "#3b82f6" },
  { label: "300", value: 300, color: "#facc15" },
  { label: "200", value: 200, color: "#ef4444" },
  { label: "500", value: 500, color: "#22c55e" },
  { label: "250", value: 250, color: "#a855f7" },
  { label: "750", value: 750, color: "#f97316" },
  { label: "400", value: 400, color: "#06b6d4" },
  { label: "1000", value: 1000, color: "#facc15" },
];

// ============ STATE ============
let deck = [];
let deckIndex = 0;
let currentCategory = null;
let currentPhrase = "";
let guessedLetters = new Set();
let solved = false;
let spinning = false;
let letterValue = 100;
let score = 0;
let wheelAngle = 0;

// ============ AUDIO ============
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function tone(freq, start, dur, type, vol) {
  const ctx = getCtx();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = type || "triangle";
  o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, ctx.currentTime + start);
  g.gain.exponentialRampToValueAtTime(vol || 0.25, ctx.currentTime + start + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
  o.connect(g).connect(ctx.destination);
  o.start(ctx.currentTime + start);
  o.stop(ctx.currentTime + start + dur + 0.05);
}
function ding(i) { tone(880 + i * 60, i * 0.18, 0.25, "triangle", 0.25); }
function softMiss() { tone(220, 0, 0.25, "sine", 0.18); }
function popSound() { tone(520, 0, 0.12, "triangle", 0.2); }
function fanfare() {
  tone(523, 0.00, 0.18, "triangle", 0.28);
  tone(659, 0.14, 0.18, "triangle", 0.28);
  tone(784, 0.28, 0.18, "triangle", 0.28);
  tone(1047, 0.42, 0.45, "triangle", 0.32);
}
function spinTicks(durationMs) {
  const ticks = 18;
  for (let i = 0; i < ticks; i++) {
    const t = (i / ticks);
    const when = t * t * (durationMs / 1000); // ticks slow down
    tone(600, when, 0.04, "square", 0.06);
  }
}

// ============ VOICE ============
function speakText(text) {
  if (!document.getElementById("voiceToggle").checked) return;
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
}

// ============ WHEEL ============
function buildWheel() {
  const svg = document.getElementById("wheelSvg");
  const n = WEDGES.length;
  const cx = 100, cy = 100, r = 96;
  let parts = "";
  for (let i = 0; i < n; i++) {
    const a0 = (i / n) * 2 * Math.PI - Math.PI / 2;
    const a1 = ((i + 1) / n) * 2 * Math.PI - Math.PI / 2;
    const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    parts += "<path d='M" + cx + "," + cy + " L" + x0.toFixed(2) + "," + y0.toFixed(2) +
      " A" + r + "," + r + " 0 0 1 " + x1.toFixed(2) + "," + y1.toFixed(2) + " Z' fill='" + WEDGES[i].color + "' stroke='#fff' stroke-width='2'/>";
    const mid = (a0 + a1) / 2;
    const tx = cx + r * 0.62 * Math.cos(mid), ty = cy + r * 0.62 * Math.sin(mid);
    const rot = (mid * 180 / Math.PI) + 90;
    parts += "<text x='" + tx.toFixed(2) + "' y='" + ty.toFixed(2) + "' fill='#1e3a8a' font-weight='900' font-size='16' text-anchor='middle' dominant-baseline='middle' transform='rotate(" + rot.toFixed(1) + " " + tx.toFixed(2) + " " + ty.toFixed(2) + ")'>" + WEDGES[i].label + "</text>";
  }
  parts += "<circle cx='100' cy='100' r='18' fill='#1e3a8a' stroke='#fff' stroke-width='3'/>";
  svg.innerHTML = parts;
}
function spinWheel() {
  if (spinning || solved) return;
  spinning = true;
  document.getElementById("spinBtn").disabled = true;
  const n = WEDGES.length;
  const target = Math.floor(Math.random() * n);
  // Pointer is at top. Wedge i spans [i*45deg, (i+1)*45deg] from top going clockwise.
  // Rotating wheel by A deg clockwise: wedge under pointer = floor(((360 - A%360)/45)) % n
  // Choose final angle so target wedge center lands at pointer:
  const wedgeDeg = 360 / n;
  const desired = 360 - (target * wedgeDeg + wedgeDeg / 2);
  const spins = 4 + Math.floor(Math.random() * 3);
  const current = wheelAngle % 360;
  const delta = (spins * 360) + ((desired - current + 360) % 360);
  wheelAngle += delta;
  const dur = 4000;
  spinTicks(dur);
  const svg = document.getElementById("wheelSvg");
  svg.style.transform = "rotate(" + wheelAngle + "deg)";
  setTimeout(function () {
    spinning = false;
    document.getElementById("spinBtn").disabled = false;
    letterValue = WEDGES[target].value;
    document.getElementById("letterValue").textContent = letterValue;
    fanfare();
    speakText("Letters are now worth " + letterValue + " points!");
  }, dur + 100);
}

// ============ DECK ============
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function buildDeck(cat) {
  if (cat === "all") {
    let all = [];
    for (const k of Object.keys(PHRASES)) all = all.concat(PHRASES[k]);
    return shuffle(all);
  }
  return shuffle(PHRASES[cat]);
}

// ============ SCREENS ============
function show(id) {
  for (const s of ["startScreen", "gameScreen", "doneScreen"]) {
    document.getElementById(s).style.display = (s === id) ? "flex" : "none";
  }
}
function goHome() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  show("startScreen");
}

// ============ GAME FLOW ============
function startGame(cat) {
  currentCategory = cat;
  deck = buildDeck(cat);
  deckIndex = 0;
  score = 0;
  document.getElementById("score").textContent = "0";
  document.getElementById("categoryLabel").textContent = CATEGORY_NAMES[cat];
  show("gameScreen");
  buildAlphabet();
  renderPhrase();
  popSound();
}
function replayCategory() { startGame(currentCategory); }

function buildAlphabet() {
  const wrap = document.getElementById("alphabet");
  wrap.innerHTML = "";
  for (let i = 0; i < 26; i++) {
    const L = String.fromCharCode(65 + i);
    const b = document.createElement("button");
    b.className = "letter-btn";
    b.textContent = L;
    b.id = "L_" + L;
    b.onclick = function () { guessLetter(L); };
    wrap.appendChild(b);
  }
}
function renderPhrase() {
  solved = false;
  guessedLetters = new Set();
  letterValue = 100;
  document.getElementById("letterValue").textContent = "100";
  currentPhrase = deck[deckIndex];
  document.getElementById("progressLabel").textContent = "Phrase " + (deckIndex + 1) + " of " + deck.length;

  // reset alphabet
  document.querySelectorAll(".letter-btn").forEach(b => {
    b.disabled = false;
    b.classList.remove("was-correct");
  });

  // build board: words of tiles
  const board = document.getElementById("board");
  board.innerHTML = "";
  const words = currentPhrase.split(" ");
  for (const w of words) {
    const wd = document.createElement("div");
    wd.className = "word";
    for (const ch of w) {
      const t = document.createElement("div");
      if (/[A-Z]/.test(ch)) {
        t.className = "tile hidden-letter";
        t.textContent = ch;
        t.dataset.letter = ch;
      } else {
        t.className = "tile punct";
        t.textContent = ch;
      }
      wd.appendChild(t);
    }
    board.appendChild(wd);
  }

  const banner = document.getElementById("solveBanner");
  banner.classList.add("hidden");
  banner.textContent = "";
  document.getElementById("solveBtn").classList.remove("hidden");
  document.getElementById("nextBtn").classList.add("hidden");
}
function guessLetter(L) {
  if (solved || spinning || guessedLetters.has(L)) return;
  guessedLetters.add(L);
  const btn = document.getElementById("L_" + L);
  btn.disabled = true;

  const tiles = Array.from(document.querySelectorAll("#board .tile[data-letter='" + L + "']"));
  if (tiles.length > 0) {
    btn.classList.add("was-correct");
    tiles.forEach((t, i) => {
      setTimeout(function () {
        t.classList.remove("hidden-letter");
        t.classList.add("just-revealed");
      }, i * 180);
      ding(i);
    });
    score += letterValue * tiles.length;
    document.getElementById("score").textContent = score;
    // solved by letters?
    if (allRevealed()) {
      setTimeout(celebrate, tiles.length * 180 + 300);
    }
  } else {
    softMiss();
  }
}
function allRevealed() {
  const letters = new Set(currentPhrase.replace(/[^A-Z]/g, "").split(""));
  for (const l of letters) if (!guessedLetters.has(l)) return false;
  return true;
}
function solveIt() {
  if (solved) return;
  document.querySelectorAll("#board .tile.hidden-letter").forEach((t, i) => {
    setTimeout(function () {
      t.classList.remove("hidden-letter");
      t.classList.add("just-revealed");
    }, i * 90);
  });
  setTimeout(celebrate, 500);
}
function celebrate() {
  if (solved) return;
  solved = true;
  score += 500; // solve bonus
  document.getElementById("score").textContent = score;
  const banner = document.getElementById("solveBanner");
  banner.textContent = "🎉 " + currentPhrase + " 🎉";
  banner.classList.remove("hidden");
  document.getElementById("solveBtn").classList.add("hidden");
  document.getElementById("nextBtn").classList.remove("hidden");
  fanfare();
  setTimeout(fanfare, 400);
  throwConfetti(24);
  speakText(currentPhrase + "! Plus a 500 point solve bonus!");
}
function nextPhrase() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  deckIndex++;
  if (deckIndex >= deck.length) {
    document.getElementById("finalScore").textContent = score;
    fanfare();
    setTimeout(fanfare, 500);
    throwConfetti(40);
    show("doneScreen");
    return;
  }
  renderPhrase();
  popSound();
}

// ============ CONFETTI ============
const CONFETTI_EMOJI = ["🎉", "✨", "⭐", "🎊", "💛", "💙"];
function throwConfetti(count) {
  const n = count || 14;
  for (let i = 0; i < n; i++) {
    const el = document.createElement("div");
    el.className = "confetti";
    el.textContent = CONFETTI_EMOJI[Math.floor(Math.random() * CONFETTI_EMOJI.length)];
    el.style.left = Math.random() * 100 + "vw";
    el.style.animationDuration = (1.8 + Math.random() * 1.6) + "s";
    el.style.animationDelay = (Math.random() * 0.4) + "s";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4200);
  }
}

// ============ SPACE BAR: advances only after the phrase is solved ============
document.addEventListener("keydown", function (ev) {
  if (ev.code !== "Space" && ev.key !== " ") return;
  if (document.getElementById("gameScreen").style.display === "none") return;
  ev.preventDefault();
  if (solved) nextPhrase();
});

buildWheel();
</script>
