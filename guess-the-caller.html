<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess the Caller</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e3a8a);
  color: white;
  text-align: center;
}

.container {
  padding: 40px;
}

h1 {
  font-size: 60px;
}

.phone {
  font-size: 120px;
  display: none;
}

.ringing {
  display: block;
  animation: shake 0.6s infinite;
}

@keyframes shake {
  0% { transform: rotate(0deg); }
  25% { transform: rotate(10deg); }
  50% { transform: rotate(0deg); }
  75% { transform: rotate(-10deg); }
  100% { transform: rotate(0deg); }
}

.message {
  font-size: 32px;
  margin: 30px;
}

.answer {
  font-size: 44px;
  color: gold;
  display: none;
}

button {
  font-size: 26px;
  padding: 15px 25px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.start { background: green; color:white; }
.reveal { background: orange; }
.next { background: skyblue; }

</style>
</head>

<body>

<div class="container">
  <h1>📞 Guess the Caller</h1>

  <div id="phone" class="phone">☎️</div>

  <div id="message" class="message">
    Press Start Call
  </div>

  <div id="answer" class="answer"></div>

  <button class="start" onclick="startCall()">Start Call</button>
  <button id="revealBtn" class="reveal" onclick="reveal()" style="display:none;">Reveal</button>
  <button id="nextBtn" class="next" onclick="next()" style="display:none;">Next</button>
</div>

<script>
let index = 0;

const callers = [
  {name:"Santa", text:"Ho ho ho... I checked my list and someone here has been acting a little too quiet.", pitch:0.7, rate:0.8},
  {name:"Rock Star", text:"Thank you... thank you very much... I heard y’all are having some fun in there.", pitch:0.8, rate:0.85},
  {name:"Country Singer", text:"Well sugar, if y’all ain’t smiling yet, we’re about to fix that.", pitch:1.2, rate:0.9},
  {name:"Game Show Host", text:"Congratulations! You’ve been selected to win absolutely nothing!", pitch:1.1, rate:1},
  {name:"President", text:"My fellow Americans, it is time to guess this caller.", pitch:0.75, rate:0.85},
  {name:"Grandma", text:"Don’t make me come in there... I raised better guessers than this.", pitch:1.1, rate:0.9}
];

function startCall(){
  const phone = document.getElementById("phone");
  const msg = document.getElementById("message");

  document.getElementById("answer").style.display = "none";
  document.getElementById("revealBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";

  phone.classList.add("ringing");
  msg.innerText = "Ring... Ring...";

  setTimeout(()=>{
    phone.classList.remove("ringing");
    msg.innerText = "Listen carefully...";

    speak(callers[index].text, callers[index].pitch, callers[index].rate);

    setTimeout(()=>{
      msg.innerText = "Who is calling?";
      document.getElementById("revealBtn").style.display = "inline-block";
    },4000);

  },2000);
}

function speak(text,pitch,rate){
  speechSynthesis.cancel();
  let msg = new SpeechSynthesisUtterance(text);
  msg.pitch = pitch;
  msg.rate = rate;
  speechSynthesis.speak(msg);
}

function reveal(){
  document.getElementById("answer").innerText = "Caller: " + callers[index].name;
  document.getElementById("answer").style.display = "block";
  document.getElementById("nextBtn").style.display = "inline-block";
}

function next(){
  index++;
  if(index >= callers.length){ index = 0; }
  document.getElementById("message").innerText = "Press Start Call";
  document.getElementById("answer").style.display = "none";
  document.getElementById("revealBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
}
</script>

</body>
</html>
