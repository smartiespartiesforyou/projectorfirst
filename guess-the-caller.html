<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess the Caller | ProjectorFirst</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
  text-align: center;
  min-height: 100vh;
}

.container {
  padding: 40px 20px;
  max-width: 1100px;
  margin: auto;
}

h1 {
  font-size: 70px;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 34px;
  margin-bottom: 30px;
}

.phone {
  font-size: 150px;
  display: none;
  margin: 20px 0;
}

.ringing {
  display: block;
  animation: ring 0.45s infinite;
}

@keyframes ring {
  0% { transform: rotate(0deg) scale(1); }
  20% { transform: rotate(12deg) scale(1.05); }
  40% { transform: rotate(-12deg) scale(1.05); }
  60% { transform: rotate(10deg) scale(1.05); }
  80% { transform: rotate(-10deg) scale(1.05); }
  100% { transform: rotate(0deg) scale(1); }
}

.message {
  background: rgba(255,255,255,0.14);
  border-radius: 24px;
  padding: 35px;
  margin: 25px auto;
  font-size: 42px;
  line-height: 1.3;
  min-height: 110px;
}

.answer {
  font-size: 56px;
  color: #fde68a;
  font-weight: bold;
  margin: 25px 0;
  display: none;
}

button {
  font-size: 34px;
  padding: 20px 35px;
  margin: 12px;
  border-radius: 18px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.start {
  background: #22c55e;
  color: white;
}

.reveal {
  background: #f59e0b;
  color: #111827;
  display: none;
}

.next {
  background: #38bdf8;
  color: #0f172a;
  display: none;
}

.footer {
  margin-top: 35px;
  font-size: 22px;
  opacity: 0.85;
}
</style>
</head>

<body>

<div class="container">
  <h1>📞 Guess the Caller</h1>
  <div class="subtitle">Listen carefully. Guess who is calling!</div>

  <div id="phone" class="phone">☎️</div>

  <div id="message" class="message">
    Press Start Call.
  </div>

  <div id="answer" class="answer"></div>

  <button class="start" onclick="startCall()">▶ Start Call</button>
  <button id="revealBtn" class="reveal" onclick="revealAnswer()">👀 Reveal Answer</button>
  <button id="nextBtn" class="next" onclick="nextCaller()">➡ Next Caller</button>

  <div class="footer">ProjectorFirst Activity Game</div>
</div>

<audio id="ringAudio" src="mp3/ringtone.mp3"></audio>
<audio id="voiceAudio"></audio>

<script>
let index = 0;

const callers = [
  {
    answer: "Santa Claus",
    file: "mp3/santa.mp3"
  },
  {
    answer: "Ms. Sarah",
    file: "mp3/sarah.mp3"
  },
  {
    answer: "Mr. John",
    file: "mp3/john.mp3"
  },
  {
    answer: "Sassy Grandma",
    file: "mp3/grandma.mp3"
  },
  {
    answer: "Administrator",
    file: "mp3/admin.mp3"
  },
  {
    answer: "Activity Director",
    file: "mp3/activity-director.mp3"
  }
];

function startCall() {
  const phone = document.getElementById("phone");
  const message = document.getElementById("message");
  const answer = document.getElementById("answer");
  const revealBtn = document.getElementById("revealBtn");
  const nextBtn = document.getElementById("nextBtn");

  const ringAudio = document.getElementById("ringAudio");
  const voiceAudio = document.getElementById("voiceAudio");

  // Reset UI
  answer.style.display = "none";
  revealBtn.style.display = "none";
  nextBtn.style.display = "none";

  message.innerText = "Ring... ring...";
  phone.classList.add("ringing");

  // Reset audio
  ringAudio.pause();
  ringAudio.currentTime = 0;
  voiceAudio.pause();
  voiceAudio.currentTime = 0;

  // Play ringtone
  ringAudio.play().catch(err => {
    console.log("Ringtone blocked:", err);
  });

  // After ringing → play voice
  setTimeout(() => {
    ringAudio.pause();
    ringAudio.currentTime = 0;

    phone.classList.remove("ringing");
    message.innerText = "Listen carefully...";

    voiceAudio.src = callers[index].file;

    voiceAudio.play().catch(err => {
      console.log("Voice blocked:", err);
      message.innerText = "Click Start Call again if you don’t hear sound.";
    });

    voiceAudio.onended = function() {
      message.innerText = "Who is calling?";
      revealBtn.style.display = "inline-block";
    };

  }, 3000);
}

function revealAnswer() {
  const answer = document.getElementById("answer");
  answer.innerText = "Caller: " + callers[index].answer;
  answer.style.display = "block";

  document.getElementById("nextBtn").style.display = "inline-block";
}

function nextCaller() {
  index++;

  if (index >= callers.length) {
    index = 0;
  }

  document.getElementById("message").innerText = "Press Start Call.";
  document.getElementById("answer").style.display = "none";
  document.getElementById("revealBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
}
</script>

</body>
</html>
