            blurbs: ["\u003Cu\u003EGenesis 1:1\u003C\/u\u003E\u003Cbr\u003EIn the beginning God created the heaven and the earth.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a This verse marks the commencement of the universe by God\u0027s hand.\u003C\/i\u003E","\u003Cu\u003EPsalm 23:1\u003C\/u\u003E\u003Cbr\u003EThe LORD is my shepherd; I shall not want.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a This assures that God provides and cares for His people like a shepherd.\u003C\/i\u003E","\u003Cu\u003EJohn 3:16\u003C\/u\u003E\u003Cbr\u003EFor God so loved the world, that he gave his only begotten Son, that whosoever believeth in him should not perish, but have everlasting life.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a A cornerstone verse about God\u0027s love and the gift of salvation through Jesus.\u003C\/i\u003E","\u003Cu\u003EPhilippians 4:13\u003C\/u\u003E\u003Cbr\u003EI can do all things through Christ which strengtheneth me.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a This verse emphasizes the strength available in Christ to face any situation.\u003C\/i\u003E","\u003Cu\u003EPsalm 27:1\u003C\/u\u003E\u003Cbr\u003EThe LORD is my light and my salvation; whom shall I fear? the LORD is the strength of my life; of whom shall I be afraid?\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a God\u0027s presence eliminates fear and provides strength.\u003C\/i\u003E","\u003Cu\u003EJeremiah 29:11\u003C\/u\u003E\u003Cbr\u003EFor I know the thoughts that I think toward you, saith the LORD, thoughts of peace, and not of evil, to give you an expected end.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a God\u0027s plans for us are filled with hope and a future.\u003C\/i\u003E","\u003Cu\u003EProverbs 3:5\u003C\/u\u003E\u003Cbr\u003ETrust in the LORD with all thine heart; and lean not unto thine own understanding.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Encourages complete trust in God rather than relying on oneself.\u003C\/i\u003E","\u003Cu\u003EJohn 11:35\u003C\/u\u003E\u003Cbr\u003EJesus wept.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a A powerful reminder of Jesus\u0027 empathy and humanity.\u003C\/i\u003E","\u003Cu\u003EIsaiah 40:31\u003C\/u\u003E\u003Cbr\u003EBut they that wait upon the LORD shall renew their strength; they shall mount up with wings as eagles; they shall run, and not be weary; and they shall walk, and not faint.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Waiting on God brings renewal and strength.\u003C\/i\u003E","\u003Cu\u003EEphesians 2:8\u003C\/u\u003E\u003Cbr\u003EFor by grace are ye saved through faith; and that not of yourselves: it is the gift of God.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Salvation is a divine gift, not a human effort.\u003C\/i\u003E","\u003Cu\u003EPsalm 119:105\u003C\/u\u003E\u003Cbr\u003EThy word is a lamp unto my feet, and a light unto my path.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a God\u0027s word provides guidance and clarity in life.\u003C\/i\u003E","\u003Cu\u003ERomans 8:28\u003C\/u\u003E\u003Cbr\u003EAnd we know that all things work together for good to them that love God, to them who are the called according to his purpose.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a God orchestrates everything for the good of those who love Him.\u003C\/i\u003E","\u003Cu\u003EJohn 1:1\u003C\/u\u003E\u003Cbr\u003EIn the beginning was the Word, and the Word was with God, and the Word was God.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Establishes the divine nature and eternal existence of Christ.\u003C\/i\u003E","\u003Cu\u003EGalatians 5:22\u003C\/u\u003E\u003Cbr\u003EBut the fruit of the Spirit is love, joy, peace, longsuffering, gentleness, goodness, faith,\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a The Holy Spirit produces these virtues in believers.\u003C\/i\u003E","\u003Cu\u003EMatthew 18:20\u003C\/u\u003E\u003Cbr\u003EFor where two or three are gathered together in my name, there am I in the midst of them.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Jesus promises His presence in communal worship.\u003C\/i\u003E","\u003Cu\u003EJohn 14:6\u003C\/u\u003E\u003Cbr\u003EI am the way, the truth, and the life: no man cometh unto the Father, but by me.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Jesus is the exclusive path to God.\u003C\/i\u003E","\u003Cu\u003EJoshua 1:9\u003C\/u\u003E\u003Cbr\u003EBe strong and of a good courage; be not afraid, neither be thou dismayed: for the LORD thy God is with thee whithersoever thou goest.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a God\u0027s presence empowers and encourages His people.\u003C\/i\u003E","\u003Cu\u003EIsaiah 9:6\u003C\/u\u003E\u003Cbr\u003EFor unto us a child is born, unto us a son is given: and the government shall be upon his shoulder: and his name shall be called Wonderful, Counsellor, The mighty God, The everlasting Father, The Prince of Peace.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a A prophecy of the birth and roles of the Messiah.\u003C\/i\u003E","\u003Cu\u003EPhilippians 4:4\u003C\/u\u003E\u003Cbr\u003ERejoice in the Lord alway: and again I say, Rejoice.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a A call to constant joy in the Lord.\u003C\/i\u003E","\u003Cu\u003EProverbs 9:10\u003C\/u\u003E\u003Cbr\u003EThe fear of the LORD is the beginning of wisdom: and the knowledge of the holy is understanding.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a True wisdom starts with reverence for God.\u003C\/i\u003E","\u003Cu\u003EMatthew 11:28\u003C\/u\u003E\u003Cbr\u003ECome unto me, all ye that labour and are heavy laden, and I will give you rest.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Jesus offers rest to the weary and burdened.\u003C\/i\u003E","\u003Cu\u003EMatthew 5:9\u003C\/u\u003E\u003Cbr\u003EBlessed are the peacemakers: for they shall be called the children of God.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Those who promote peace reflect God\u0027s nature.\u003C\/i\u003E","\u003Cu\u003EMatthew 6:33\u003C\/u\u003E\u003Cbr\u003EBut seek ye first the kingdom of God, and his righteousness; and all these things shall be added unto you.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Prioritize God\u0027s kingdom and righteousness over worldly concerns.\u003C\/i\u003E","\u003Cu\u003EMatthew 5:16\u003C\/u\u003E\u003Cbr\u003ELet your light so shine before men, that they may see your good works, and glorify your Father which is in heaven.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Believers are called to live in a way that reflects God\u0027s glory.\u003C\/i\u003E","\u003Cu\u003EPsalm 91:1\u003C\/u\u003E\u003Cbr\u003EHe that dwelleth in the secret place of the most High shall abide under the shadow of the Almighty.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Living in God\u0027s presence offers protection and comfort.\u003C\/i\u003E","\u003Cu\u003EJohn 6:35\u003C\/u\u003E\u003Cbr\u003EAnd Jesus said unto them, I am the bread of life: he that cometh to me shall never hunger; and he that believeth on me shall never thirst.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Jesus satisfies the spiritual needs of those who come to Him.\u003C\/i\u003E","\u003Cu\u003EIsaiah 26:3\u003C\/u\u003E\u003Cbr\u003EThou wilt keep him in perfect peace, whose mind is stayed on thee: because he trusteth in thee.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Trusting in God brings peace of mind.\u003C\/i\u003E","\u003Cu\u003ERomans 3:23\u003C\/u\u003E\u003Cbr\u003EFor all have sinned, and come short of the glory of God;\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Every person has failed to meet God\u0027s perfect standard.\u003C\/i\u003E","\u003Cu\u003ENahum 1:7\u003C\/u\u003E\u003Cbr\u003EThe LORD is good, a strong hold in the day of trouble; and he knoweth them that trust in him.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a God is a refuge for those who trust Him.\u003C\/i\u003E","\u003Cu\u003ERomans 6:23\u003C\/u\u003E\u003Cbr\u003EFor the wages of sin is death; but the gift of God is eternal life through Jesus Christ our Lord.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Sin leads to death, but God offers eternal life through Christ.\u003C\/i\u003E","\u003Cu\u003EJohn 14:2\u003C\/u\u003E\u003Cbr\u003EIn my Father\u0027s house are many mansions: if it were not so, I would have told you. I go to prepare a place for you.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Jesus promises a place for believers in heaven.\u003C\/i\u003E","\u003Cu\u003EMatthew 5:8\u003C\/u\u003E\u003Cbr\u003EBlessed are the pure in heart: for they shall see God.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Purity of heart grants the vision to see God.\u003C\/i\u003E","\u003Cu\u003EMicah 6:8\u003C\/u\u003E\u003Cbr\u003EHe hath shewed thee, O man, what is good; and what doth the LORD require of thee, but to do justly, and to love mercy, and to walk humbly with thy God?\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a God desires justice, mercy, and humility from His people.\u003C\/i\u003E","\u003Cu\u003ERomans 5:8\u003C\/u\u003E\u003Cbr\u003EBut God commendeth his love toward us, in that, while we were yet sinners, Christ died for us.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a God\u0027s love is demonstrated through Christ\u0027s sacrificial death.\u003C\/i\u003E","\u003Cu\u003EPsalm 51:10\u003C\/u\u003E\u003Cbr\u003ECreate in me a clean heart, O God; and renew a right spirit within me.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a A plea for inner renewal and purity.\u003C\/i\u003E","\u003Cu\u003ERevelation 3:20\u003C\/u\u003E\u003Cbr\u003EBehold, I stand at the door, and knock: if any man hear my voice, and open the door, I will come in to him, and will sup with him, and he with me.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Christ invites us to fellowship with Him.\u003C\/i\u003E","\u003Cu\u003ELuke 19:10\u003C\/u\u003E\u003Cbr\u003EFor the Son of man is come to seek and to save that which was lost.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Jesus\u0027 mission was to rescue the lost.\u003C\/i\u003E","\u003Cu\u003E1 Samuel 16:7\u003C\/u\u003E\u003Cbr\u003EBut the LORD said unto Samuel, Look not on his countenance, or on the height of his stature; because I have refused him: for the LORD seeth not as man seeth; for man looketh on the outward appearance, but the LORD looketh on the heart.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a God values the heart over outward appearances.\u003C\/i\u003E","\u003Cu\u003EJohn 10:10\u003C\/u\u003E\u003Cbr\u003EThe thief cometh not, but for to steal, and to kill, and to destroy: I am come that they might have life, and that they might have it more abundantly.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Jesus offers abundant life as opposed to destruction.\u003C\/i\u003E","\u003Cu\u003EJohn 13:34\u003C\/u\u003E\u003Cbr\u003EA new commandment I give unto you, That ye love one another; as I have loved you, that ye also love one another.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Jesus commands His followers to love each other sacrificially.\u003C\/i\u003E","\u003Cu\u003E2 Corinthians 5:17\u003C\/u\u003E\u003Cbr\u003ETherefore if any man be in Christ, he is a new creature: old things are passed away; behold, all things are become new.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Believers in Christ experience a transformative new beginning.\u003C\/i\u003E","\u003Cu\u003E1 Peter 5:7\u003C\/u\u003E\u003Cbr\u003ECasting all your care upon him; for he careth for you.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a We are invited to entrust our worries to God, who cares for us.\u003C\/i\u003E","\u003Cu\u003EPsalm 34:4\u003C\/u\u003E\u003Cbr\u003EI sought the LORD, and he heard me, and delivered me from all my fears.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Seeking God brings deliverance from fear.\u003C\/i\u003E","\u003Cu\u003ELeviticus 19:18\u003C\/u\u003E\u003Cbr\u003EThou shalt love thy neighbour as thyself.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a A fundamental command to love others with the same regard as oneself.\u003C\/i\u003E","\u003Cu\u003EGalatians 6:9\u003C\/u\u003E\u003Cbr\u003EAnd let us not be weary in well doing: for in due season we shall reap, if we faint not.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Perseverance in doing good will eventually bring results.\u003C\/i\u003E","\u003Cu\u003EProverbs 18:10\u003C\/u\u003E\u003Cbr\u003EThe name of the LORD is a strong tower: the righteous runneth into it, and is safe.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a God\u0027s name is a refuge of safety for the righteous.\u003C\/i\u003E","\u003Cu\u003EJohn 15:13\u003C\/u\u003E\u003Cbr\u003EGreater love hath no man than this, that a man lay down his life for his friends.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a The ultimate expression of love is self-sacrifice.\u003C\/i\u003E","\u003Cu\u003EPsalm 37:23\u003C\/u\u003E\u003Cbr\u003EThe steps of a good man are ordered by the LORD: and he delighteth in his way.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a God directs the path of those who follow Him.\u003C\/i\u003E","\u003Cu\u003EHebrews 4:2\u003C\/u\u003E\u003Cbr\u003EFor unto us was the gospel preached, as well as unto them: but the word preached did not profit them, not being mixed with faith in them that heard it.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Faith is necessary to benefit from the gospel message.\u003C\/i\u003E","\u003Cu\u003EHebrews 4:16\u003C\/u\u003E\u003Cbr\u003ELet us therefore come boldly unto the throne of grace, that we may obtain mercy, and find grace to help in time of need.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a We are encouraged to approach God confidently for help.\u003C\/i\u003E","\u003Cu\u003E1 John 1:9\u003C\/u\u003E\u003Cbr\u003EIf we confess our sins, he is faithful and just to forgive us our sins, and to cleanse us from all unrighteousness.\u003Cbr\u003E\u003Ci\u003E\ud83d\udd4a Confession leads to forgiveness and cleansing.\u003C\/i\u003E"],

                        licenseText = licensePart.toUpperCase().replace(/-/g, ' ').replace('CC ', 'CC ');

    <script>
        let START_URL = '/start-session';
        let END_URL = '/end-session';
        let HEARTBEAT_URL = '/heartbeat-session';
        (() => {
            const urlParams = new URLSearchParams(window.location.search);
            const jwtToken = urlParams.get('token');
            const CSRF = '8U6zGavQaq8M6Jqwpnq9Ewc2CBYjUR4gjrFLTkva';

            const buildHeaders = () => {
                const h = {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json',
                    'X-CSRF-TOKEN': CSRF,
                };
                if (jwtToken) {                    // ← add ONLY when the param exists and is a string
                    h['Authorization'] = `Bearer ${jwtToken}`;
                }
                return h;
            };

            /* 1. declare once in the outer scope (let, not const) */


            /* 2. adjust if a token is present */
            if (jwtToken) {
                START_URL += '?token=' + jwtToken;
                END_URL += '?token=' + jwtToken;
                HEARTBEAT_URL += '?token=' + jwtToken;
            }

            // Keep one session per browser TAB
            let sid = sessionStorage.getItem('mc_session_id');

            // ---------- Heartbeat tracking variables ----------
            let lastActivity = Date.now();
            let heartbeatInterval = null;
            const HEARTBEAT_FREQUENCY = 5 * 60 * 1000;  // Send heartbeat every 5 minutes
            const IDLE_THRESHOLD = 10 * 60 * 1000;      // Consider idle after 10 minutes of no activity

            // ---------- helpers ----------
            const ajax = (url, bodyObj) =>
                fetch(url, {
                    method: 'POST',
                    headers: buildHeaders(),
                    body:
                        JSON.stringify(bodyObj)
                })
            ;

            // ---------- start session ----------
            const begin = async () => {
                if (sid) return;                         // already tracking this tab
                try {
                    const res = await ajax(START_URL, {});
                    if (!res.ok) {
                        console.warn('Session start failed:', res.status);
                        return;  // Don't start heartbeat if session creation fails
                    }
                    const data = await res.json();
                    sid = data.session_id;
                    sessionStorage.setItem('mc_session_id', sid);

                    // Start heartbeat monitoring after session starts
                    startHeartbeatMonitoring();
                } catch (error) {
                    console.warn('Failed to start session tracking:', error);
                    // Don't crash - just skip session tracking
                }
            };

            // ---------- end session ----------
            const finish = () => {
                if (!sid) return;

                // Stop heartbeat monitoring
                if (heartbeatInterval) {
                    clearInterval(heartbeatInterval);
                    heartbeatInterval = null;
                }

                fetch(END_URL, {
                        method: 'POST',
                        keepalive: true,                 // ← works like sendBeacon
                        headers: buildHeaders(),
                        body: JSON.stringify({session_id: sid}),
                    }
                )
                ;

                sessionStorage.removeItem('mc_session_id');
            };

            // ---------- Send heartbeat ----------
            const sendHeartbeat = () => {
                if (!sid) return;

                // Only send heartbeat if user was active recently
                const timeSinceActivity = Date.now() - lastActivity;
                if (timeSinceActivity > IDLE_THRESHOLD) {
                    return;  // User is idle, skip heartbeat
                }

                // Send heartbeat (fire and forget)
                fetch(HEARTBEAT_URL, {
                    method: 'POST',
                    headers: buildHeaders(),
                    body: JSON.stringify({session_id: sid}),
                }).catch(() => {
                    // Silently ignore heartbeat errors
                });
            };

            // ---------- Track user activity ----------
            const updateActivity = () => {
                lastActivity = Date.now();
            };

            // ---------- Start heartbeat monitoring ----------
            const startHeartbeatMonitoring = () => {
                if (heartbeatInterval) return;  // Already monitoring

                // Track various user activities (throttled)
                let activityThrottle = null;
                const throttledActivity = () => {
                    if (activityThrottle) return;
                    activityThrottle = setTimeout(() => {
                        updateActivity();
                        activityThrottle = null;
                    }, 1000);  // Throttle to once per second
                };

                // Listen for activity events
                document.addEventListener('mousemove', throttledActivity);
                document.addEventListener('keypress', throttledActivity);
                document.addEventListener('click', throttledActivity);
                document.addEventListener('scroll', throttledActivity);
                document.addEventListener('touchstart', throttledActivity);

                // Send heartbeats periodically
                heartbeatInterval = setInterval(sendHeartbeat, HEARTBEAT_FREQUENCY);
