<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Scrambler — ProjectorFirst</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #fff;
      color: #111;
      font-family: Arial, sans-serif;
    }
    .modal-bg {
      background: rgba(0, 0, 0, 0.55);
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 50;
    }
    .modal {
      background: white;
      color: black;
      border-radius: 20px;
      padding: 30px;
      width: 90%;
      max-width: 700px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }
    .big-btn {
      font-size: 40px;
      padding: 25px 60px;
      border-radius: 1rem;
      font-weight: 800;
      color: white;
      transition: background-color 0.1s ease;
    }
    .pf-blue { background: #1e3a8a; }
    .pf-blue:hover { background: #1d4ed8; }
  </style>
</head>

<body class="min-h-screen">

  <!-- Header -->
  <div class="max-w-6xl mx-auto flex justify-between items-center p-6 border-b border-gray-200">
    <a href="apps.html" class="pf-blue text-white text-xl font-bold px-5 py-3 rounded-xl">← Back to Apps</a>
    <button id="openEditor" class="bg-purple-700 text-white text-xl font-bold px-6 py-3 rounded-xl hover:bg-purple-600">
      Word Editor 📝
    </button>
  </div>

  <!-- Category Screen -->
  <div id="categoryScreen" class="text-center mt-10 px-6 max-w-6xl mx-auto">
    <h1 class="text-4xl md:text-6xl font-extrabold text-blue-800 mb-10">Choose a Category</h1>
    <div id="categoryButtons" class="grid grid-cols-1 sm:grid-cols-2 gap-6 max-w-4xl mx-auto"></div>
  </div>

  <!-- Game Screen -->
  <div id="gameScreen" class="text-center mt-16 px-4 hidden max-w-6xl mx-auto">
    <h1 class="text-4xl md:text-6xl font-extrabold text-blue-800 mb-10" id="categoryTitle">Category</h1>

    <div id="scramble" class="text-7xl md:text-8xl font-black text-blue-900 tracking-widest my-10 break-words">
      Press “New Word”
    </div>
    <div id="answer" class="text-5xl md:text-6xl font-black text-green-700 mt-8 hidden break-words"></div>
    <div id="status" class="text-lg text-gray-600 mt-4"></div>

    <div class="flex justify-center gap-6 mt-10 flex-wrap">
      <button id="newWordBtn" class="big-btn pf-blue">New Word</button>
      <button id="revealBtn" class="big-btn bg-green-700 hover:bg-green-600">Reveal Answer</button>
      <button id="backBtn" class="big-btn bg-gray-600 hover:bg-gray-500">⬅ Back</button>
    </div>
  </div>

  <!-- Editor Modal -->
  <div id="modalBg" class="modal-bg">
    <div class="modal">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-bold text-blue-800">Word Editor</h2>
        <button id="closeEditor" class="px-4 py-1 bg-gray-300 rounded-xl font-bold hover:bg-gray-400">Close</button>
      </div>

      <label class="font-bold text-gray-700">Word</label>
      <input id="inputWord" class="w-full border p-3 rounded-xl mb-4 text-lg" placeholder="Enter a word…" />

      <label class="font-bold text-gray-700">Category</label>
      <select id="inputCategory" class="w-full border p-3 rounded-xl mb-4 text-lg"></select>

      <input
        id="newCategoryInput"
        class="w-full border p-3 rounded-xl mb-4 text-lg hidden"
        placeholder="Enter new category…"
      />

      <button id="saveBtn" class="bg-green-600 text-white font-bold px-6 py-3 rounded-xl hover:bg-green-500">Save Word</button>

      <h3 class="text-xl font-bold mt-8 mb-2 text-blue-700">Your Saved Words</h3>
      <ul id="savedList" class="space-y-2 text-lg max-h-[250px] overflow-y-auto"></ul>
    </div>
  </div>

  <script>
    const DATA_VERSION = "scrambler-v3-2026-03-21";

    const defaultCategories = [
      "Bible",
      "Animals",
      "History",
      "Food",
      "Fun Facts",
      "Music",
      "Movies",
      "New Orleans",
      "New Years",
      "Old TV Shows",
      "Valentine's Day",
      "St. Patrick's Day",
      "Mardi Gras",
      "Easter",
      "July 4th",
      "Memorial Day",
      "Veterans Day",
      "Halloween",
      "Thanksgiving",
      "Christmas"
    ];

    const wordsByCategory = {
      "Bible": [
        "NOAH","DAVID","MOSES","JESUS","MARY","JOSEPH","BIBLE","PRAYER","FAITH","CROSS",
        "HEAVEN","DISCIPLES","PSALMS","COMMANDMENTS","SHEPHERD","ALTAR","MIRACLE","PARABLE","GOLIATH","GENESIS"
      ],
      "Animals": [
        "DOG","CAT","LION","TIGER","BEAR","ELEPHANT","ZEBRA","HORSE","RABBIT","MONKEY",
        "FOX","DEER","OWL","DUCK","FROG","SNAKE","TURTLE","PANDA","WOLF","EAGLE"
      ],
      "History": [
        "LINCOLN","WASHINGTON","REVOLUTION","FREEDOM","CONSTITUTION","PRESIDENT","AMERICA","CIVILWAR","DECLARATION","GOVERNMENT",
        "COLONY","FLAG","PIONEER","SETTLERS","LIBERTY","SENATE","CONGRESS","PATRIOT","UNION","CAPITOL"
      ],
      "Food": [
        "PIZZA","BURGER","FRIES","COOKIE","BACON","APPLE","ICECREAM","SANDWICH","PANCAKE","WAFFLE",
        "SPAGHETTI","MEATBALL","CHICKEN","STEAK","CHEESE","SOUP","TACO","SALAD","BISCUIT","POPCORN"
      ],
      "Fun Facts": [
        "OCTOPUS","RAINBOW","PLANET","DINOSAUR","VOLCANO","GALAXY","COMET","TELESCOPE","PENGUIN","KANGAROO",
        "JUPITER","SATURN","MUSEUM","PYRAMID","ECLIPSE","CRYSTAL","THUNDER","LIGHTNING","WATERFALL","BUTTERFLY"
      ],
      "Music": [
        "ELVIS","GUITAR","PIANO","JAZZ","BLUES","SINGER","MELODY","LYRICS","BAND","CONCERT",
        "TRUMPET","DRUMMER","VIOLIN","CHORUS","HARMONY","RHYTHM","COUNTRY","GOSPEL","DANCING","MICROPHONE"
      ],
      "Movies": [
        "ROCKY","TITANIC","JAWS","FROZEN","BATMAN","SUPERMAN","AVATAR","GREASE","CASABLANCA","BAMBI",
        "PINOCCHIO","ALADDIN","DUMBO","CINDERELLA","JURASSIC","GODFATHER","STARWARS","ET","MARYPOPPINS","PSYCHO"
      ],
      "New Orleans": [
        "BEIGNET","BOURBON","CAJUN","GUMBO","POBOY","JAZZFEST","PARADE","FRENCHQUARTER","STREETCAR","LOUISIANA",
        "BAYOU","CREOLE","RIVERWALK","CAFEAULAIT","MUFFULETTA","SAINTS","SUPERDOME","MISSISSIPPI","TRUMPET","MAGAZINE"
      ],
      "New Years": [
        "MIDNIGHT","CONFETTI","PARTY","COUNTDOWN","CELEBRATE","CHEERS","RESOLUTION","FIREWORKS","TOAST","CLOCK",
        "SPARKLER","BALLOONS","STREAMERS","MIDNIGHTKISS","JANUARY","FESTIVE","CHAMPAGNE","LAUGHTER","DANCING","GATHERING"
      ],
      "Old TV Shows": [
        "BONANZA","MASH","CHEERS","GUNSMOKE","BEWITCHED","PERRYMASON","MATLOCK","DALLAS","DYNASTY","MASHUNIT",
        "LASSIE","FLIPPER","DRAGNET","KOJAK","COLUMBO","JEOPARDY","WHEELFORTUNE","ANDYGRIFFITH","WALTONS","LUCY"
      ],
      "Valentine's Day": [
        "HEART","CUPID","ROSES","CANDY","LOVE","HUGS","KISSES","FLOWERS","CHOCOLATE","ROMANCE",
        "VALENTINE","CARD","SWEETHEART","DINNER","POEM","BALLOON","RED","PINK","DARLING","AFFECTION"
      ],
      "St. Patrick's Day": [
        "CLOVER","GREEN","LEPRECHAUN","SHAMROCK","RAINBOW","GOLD","LUCK","POTOFGOLD","IRELAND","MARCH",
        "PARADE","BAGPIPE","CELTIC","TREASURE","CHARM","EMERALD","JIG","CABBAGE","MINT","WHISTLE"
      ],
      "Mardi Gras": [
        "PARADE","BEADS","KINGCAKE","MASK","FLOAT","PURPLE","GOLD","GREEN","CARNIVAL","DOUBLOON",
        "COSTUME","MUSIC","DANCING","CELEBRATION","KREWE","JESTER","FEATHERS","TRUMPET","MARCHING","PARTY"
      ],
      "Easter": [
        "BUNNY","EGGS","BASKET","SPRING","CHOCOLATE","HUNT","LILIES","PASTEL","JELLYBEANS","SUNRISE",
        "CHICK","BONNET","FLOWERS","RABBIT","SUNDAY","REJOICE","CANDY","CROSS","BLOSSOM","PICNIC"
      ],
      "July 4th": [
        "FIREWORK","FREEDOM","FLAG","AMERICA","PARADE","CELEBRATE","INDEPENDENCE","REDWHITEBLUE","PICNIC","SPARKLER",
        "PATRIOT","LIBERTY","EAGLE","GRILLING","SUMMER","CONSTITUTION","STARS","STRIPES","NATION","HOLIDAY"
      ],
      "Memorial Day": [
        "HONOR","SERVICE","PARADE","REMEMBER","FLAG","HERO","TRIBUTE","COURAGE","SOLDIER","FREEDOM",
        "SACRIFICE","NATION","GRATITUDE","MONUMENT","RESPECT","DUTY","BRAVE","PATRIOT","CEREMONY","MEMORY"
      ],
      "Veterans Day": [
        "VETERAN","SALUTE","ARMY","PATRIOT","SERVICE","HONOR","FREEDOM","COUNTRY","NAVY","MARINES",
        "AIRFORCE","COASTGUARD","UNIFORM","BRAVE","TRIBUTE","MEDAL","FLAG","CEREMONY","DUTY","REMEMBER"
      ],
      "Halloween": [
        "PUMPKIN","GHOST","COSTUME","CANDY","WITCH","BAT","SPIDER","HAUNTED","MASK","MONSTER",
        "SKELETON","BROOM","JACKOLANTERN","MOONLIGHT","HOWL","CREEPY","SCARY","TREAT","PARTY","ORANGE"
      ],
      "Thanksgiving": [
        "TURKEY","GRAVY","FAMILY","HARVEST","STUFFING","PUMPKINPIE","DINNER","BLESSINGS","AUTUMN","FEAST",
        "CORN","CRANBERRY","POTATOES","PARADE","THANKFUL","GATHERING","ROLLS","KIN","TRADITION","NOVEMBER"
      ],
      "Christmas": [
        "SANTA","REINDEER","PRESENT","MISTLETOE","TREE","LIGHTS","ORNAMENT","CAROL","STOCKING","SNOWMAN",
        "GINGERBREAD","WREATH","TINSEL","SLEIGH","HOLLY","ELF","NATIVITY","CANDYCANE","BELLS","JOYFUL"
      ]
    };

    const defaultWords = Object.entries(wordsByCategory).flatMap(([category, arr]) =>
      arr.map(word => ({ word, category }))
    );

    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    // Force refresh of old stored data when version changes
    if (localStorage.getItem("scrambleDataVersion") !== DATA_VERSION) {
      localStorage.setItem("scrambleDataVersion", DATA_VERSION);
      localStorage.setItem("scrambleCategories", JSON.stringify(defaultCategories));
      localStorage.setItem("scrambleWords", JSON.stringify(defaultWords));
    }

    let categories = JSON.parse(localStorage.getItem("scrambleCategories") || "null");
    let words = JSON.parse(localStorage.getItem("scrambleWords") || "null");

    if (!Array.isArray(categories) || categories.length === 0) {
      categories = [...defaultCategories];
      localStorage.setItem("scrambleCategories", JSON.stringify(categories));
    }

    if (!Array.isArray(words) || words.length === 0) {
      words = [...defaultWords];
      localStorage.setItem("scrambleWords", JSON.stringify(words));
    }

    const modalBg = document.getElementById("modalBg");
    const categoryButtons = document.getElementById("categoryButtons");
    const inputCategory = document.getElementById("inputCategory");
    const newCategoryInput = document.getElementById("newCategoryInput");
    const scrambleEl = document.getElementById("scramble");
    const answerEl = document.getElementById("answer");
    const statusEl = document.getElementById("status");

    let filtered = [];
    let currentWord = "";
    let currentCategory = "";
    let categoryQueue = {};

    function renderCategoryButtons() {
      categoryButtons.innerHTML = "";
      categories.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "pf-blue text-white text-2xl md:text-3xl font-bold py-6 rounded-2xl transition-all transform hover:scale-[1.01]";
        btn.textContent = cat;
        btn.onclick = () => startCategory(cat);
        categoryButtons.appendChild(btn);
      });
    }

    function updateCategoryDropdown() {
      inputCategory.innerHTML = "";
      categories.forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat;
        opt.textContent = cat;
        inputCategory.appendChild(opt);
      });

      const addNew = document.createElement("option");
      addNew.value = "__NEW__";
      addNew.textContent = "+ Add New Category";
      inputCategory.appendChild(addNew);
    }

    inputCategory.onchange = () => {
      if (inputCategory.value === "__NEW__") {
        newCategoryInput.classList.remove("hidden");
      } else {
        newCategoryInput.classList.add("hidden");
      }
    };

    document.getElementById("openEditor").onclick = () => {
      modalBg.style.display = "flex";
      updateSavedList();
    };

    document.getElementById("closeEditor").onclick = () => {
      modalBg.style.display = "none";
      newCategoryInput.value = "";
      newCategoryInput.classList.add("hidden");
    };

    document.getElementById("saveBtn").onclick = () => {
      const w = document.getElementById("inputWord").value.trim().toUpperCase();
      let cat = inputCategory.value;

      if (!w) {
        alert("Please enter a word.");
        return;
      }

      if (cat === "__NEW__") {
        cat = newCategoryInput.value.trim();
        if (!cat) {
          alert("Enter a category name.");
          return;
        }
        if (!categories.includes(cat)) {
          categories.push(cat);
          localStorage.setItem("scrambleCategories", JSON.stringify(categories));
          renderCategoryButtons();
          updateCategoryDropdown();
        }
      }

      words.push({ word: w, category: cat });
      localStorage.setItem("scrambleWords", JSON.stringify(words));
      categoryQueue[cat] = [];

      document.getElementById("inputWord").value = "";
      newCategoryInput.value = "";
      newCategoryInput.classList.add("hidden");
      inputCategory.value = cat;
      updateSavedList();
    };

    function updateSavedList() {
      const list = document.getElementById("savedList");
      list.innerHTML = "";

      words.forEach((w, i) => {
        const li = document.createElement("li");
        li.innerHTML = `
          <div class="flex justify-between bg-gray-100 p-3 rounded-xl items-center">
            <div class="flex-1"><strong>${w.word}</strong> <em class="text-gray-500">(${w.category})</em></div>
            <button onclick="deleteWord(${i})" class="bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-600 ml-4">Delete</button>
          </div>`;
        list.appendChild(li);
      });
    }

    function deleteWord(i) {
      const removed = words[i];
      words.splice(i, 1);
      localStorage.setItem("scrambleWords", JSON.stringify(words));
      if (removed && removed.category) {
        categoryQueue[removed.category] = [];
      }
      updateSavedList();
    }
    window.deleteWord = deleteWord;

    function shuffleWord(word) {
      const arr = word.split("");
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      let scrambled = arr.join("");

      if (scrambled === word && word.length > 1) {
        for (let tries = 0; tries < 10; tries++) {
          for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
          }
          scrambled = arr.join("");
          if (scrambled !== word) break;
        }
      }
      return scrambled;
    }

    function getNextWordForCategory(cat) {
      const categoryWords = words.filter(w => w.category === cat).map(w => w.word);

      if (categoryWords.length === 0) {
        return null;
      }

      if (!categoryQueue[cat] || categoryQueue[cat].length === 0) {
        categoryQueue[cat] = shuffleArray(categoryWords);
      }

      return categoryQueue[cat].pop();
    }

    function updateStatus(cat) {
      const total = words.filter(w => w.category === cat).length;
      const remaining = categoryQueue[cat] ? categoryQueue[cat].length : 0;
      const used = total - remaining;
      statusEl.textContent = `Used this round: ${used}/${total}`;
    }

    function startCategory(cat) {
      currentCategory = cat;
      filtered = words.filter(w => w.category === cat);
      document.getElementById("categoryScreen").classList.add("hidden");
      document.getElementById("gameScreen").classList.remove("hidden");
      document.getElementById("categoryTitle").textContent = cat;
      newWord();
    }

    function newWord() {
      if (!currentCategory) return;

      if (words.filter(w => w.category === currentCategory).length === 0) {
        scrambleEl.textContent = "No words yet in this category!";
        answerEl.classList.add("hidden");
        statusEl.textContent = "";
        return;
      }

      const next = getNextWordForCategory(currentCategory);
      currentWord = next;
      scrambleEl.textContent = shuffleWord(currentWord);
      answerEl.textContent = currentWord;
      answerEl.classList.add("hidden");
      updateStatus(currentCategory);
    }

    function revealAnswer() {
      answerEl.classList.remove("hidden");
    }

    function backToCategories() {
      document.getElementById("gameScreen").classList.add("hidden");
      document.getElementById("categoryScreen").classList.remove("hidden");
      answerEl.classList.add("hidden");
      statusEl.textContent = "";
      currentCategory = "";
    }

    document.getElementById("newWordBtn").onclick = newWord;
    document.getElementById("revealBtn").onclick = revealAnswer;
    document.getElementById("backBtn").onclick = backToCategories;

    renderCategoryButtons();
    updateCategoryDropdown();
  </script>

</body>
</html>
