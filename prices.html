<style>
  /* Vintage price tag: yellow tag with a punched hole, like an old store tag */
  .price-tag {
    position: relative;
    background: #fde047;
    color: #1e3a8a;
    border-radius: 1rem;
    box-shadow: 0 6px 0 rgba(0,0,0,.15);
  }
  .price-tag::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 1rem;
    transform: translateY(-50%);
    width: 1.1rem;
    height: 1.1rem;
    background: #f8fafc;
    border: 3px solid #1e3a8a;
    border-radius: 9999px;
  }
  /* TODAY reveal: a rubber-stamp slam */
  .stamp {
    display: inline-block;
    background: #dc2626;
    color: #fff;
    border: 6px solid #fff;
    border-radius: 1rem;
    transform: rotate(-4deg);
    box-shadow: 0 8px 20px rgba(0,0,0,.35);
  }
  @keyframes slamIn {
    0%   { transform: rotate(-4deg) scale(2.4); opacity: 0; }
    70%  { transform: rotate(-4deg) scale(.95); opacity: 1; }
    100% { transform: rotate(-4deg) scale(1); opacity: 1; }
  }
  .stamp.slam { animation: slamIn .45s ease-out both; }
  @media (prefers-reduced-motion: reduce) {
    .stamp.slam { animation: none; }
  }
  button:focus-visible, a:focus-visible {
    outline: 4px solid #fde047;
    outline-offset: 3px;
  }

  { e:"☎️",  item:"Long-distance call (per minute)", era:"1950s", then:"$2.00", now:"FREE", t:2.00, n:0, line:"Now you can talk all day for free!" },
  { e:"🔢",  item:"Pocket calculator",      era:"1970s", then:"$100",    now:"FREE",     t:100,   n:0,   line:"It's free on your phone now!" },
  { e:"📚",  item:"Encyclopedia set",       era:"1960s", then:"$500",    now:"FREE",     t:500,   n:0,   line:"The whole world's knowledge — free online!" },
  { e:"⏲️",  item:"Microwave oven",         era:"1970s", then:"$500",    now:"$80",      t:500,   n:80,  line:"Another one that got cheaper!" }

let deck = [];
let idx = 0;
let revealed = false;

const $ = id => document.getElementById(id);

function shuffle(arr){
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shockLine(it){
  if (it.line) return it.line;
  const mult = it.n / it.t;
  if (mult >= 2) {
    const rounded = mult >= 20 ? Math.round(mult / 5) * 5 : Math.round(mult);
    return `That's about ${rounded} times the price!`;
  }
  return "Not as big a jump as you'd think!";
}

function showItem(){
  const it = deck[idx];
  revealed = false;

  $("eraBadge").textContent = it.era;
  $("productEmoji").textContent = it.e;
  $("productEmoji").setAttribute("aria-label", it.item);
  $("itemName").textContent = it.item;
  $("thenPrice").textContent = it.then;
  $("nowPrice").textContent = it.now;
  $("shockLine").textContent = shockLine(it);

  $("revealBlock").classList.add("hidden");
  $("promptLine").classList.remove("hidden");
  $("revealBtn").disabled = false;
  $("revealBtn").classList.remove("opacity-40");
  $("progress").textContent = `${idx + 1} of ${deck.length}`;
  $("nextBtn").textContent = (idx === deck.length - 1) ? "Play Again ↻" : "Next Item →";
}

function reveal(){
  if (revealed) return;
  revealed = true;
  $("promptLine").classList.add("hidden");
  const block = $("revealBlock");
  block.classList.remove("hidden");
  const stamp = block.querySelector(".stamp");
  stamp.classList.remove("slam");
  void stamp.offsetWidth; /* restart animation */
  stamp.classList.add("slam");
  $("revealBtn").disabled = true;
  $("revealBtn").classList.add("opacity-40");
}

function next(){
  idx++;
  if (idx >= deck.length) {
    deck = shuffle(ITEMS);
    idx = 0;
  }
  showItem();
}

$("revealBtn").onclick = reveal;
$("nextBtn").onclick = next;
$("fullscreenBtn").onclick = () => document.documentElement.requestFullscreen();

/* Space or Enter: reveal first, advance second — works with presentation clickers */
document.addEventListener("keydown", (ev) => {
  if (ev.code === "Space" || ev.code === "Enter") {
    if (ev.target.tagName === "BUTTON" || ev.target.tagName === "A") return;
    ev.preventDefault();
    revealed ? next() : reveal();
  }
});

deck = shuffle(ITEMS);
idx = 0;
showItem();
</script>
