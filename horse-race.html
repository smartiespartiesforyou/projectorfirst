<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horse Race Game | ProjectorFirst</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: Arial, sans-serif;
}

.track {
  height: 80px;
  border: 3px solid #333;
  margin-bottom: 15px;
  position: relative;
  background: repeating-linear-gradient(
    90deg,
    #f1f5f9,
    #f1f5f9 40px,
    #e2e8f0 40px,
    #e2e8f0 80px
  );
}

.horse {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 40px;
  transition: left 0.5s ease;
}

.finish-line {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 10px;
  background: black;
}
</style>
</head>

<body class="bg-gray-100 text-center p-6">

<h1 class="text-4xl font-bold mb-6">🐎 Horse Race</h1>

<div id="raceTrack" class="max-w-4xl mx-auto mb-6"></div>

<button onclick="rollDice()" class="bg-blue-600 text-white text-2xl px-8 py-4 rounded-xl shadow-lg">
🎲 Roll Dice
</button>

<button onclick="resetRace()" class="bg-red-500 text-white text-2xl px-8 py-4 rounded-xl ml-4">
Reset
</button>

<p id="result" class="text-3xl font-bold mt-6"></p>

<script>
const horses = [
  { color: "red", position: 0 },
  { color: "blue", position: 0 },
  { color: "green", position: 0 },
  { color: "yellow", position: 0 },
  { color: "purple", position: 0 }
];

const trackLength = 90; // % to win

const raceTrack = document.getElementById("raceTrack");

function createTracks() {
  raceTrack.innerHTML = "";
  horses.forEach((horse, index) => {
    const track = document.createElement("div");
    track.className = "track";

    const finish = document.createElement("div");
    finish.className = "finish-line";

    const horseEl = document.createElement("div");
    horseEl.className = "horse";
    horseEl.id = "horse-" + index;
    horseEl.innerHTML = "🐎";
    horseEl.style.color = horse.color;
    horseEl.style.left = "0%";

    track.appendChild(horseEl);
    track.appendChild(finish);
    raceTrack.appendChild(track);
  });
}

function rollDice() {
  const roll = Math.floor(Math.random() * 6) + 1;

  // pick random horse
  const horseIndex = Math.floor(Math.random() * horses.length);
  const horse = horses[horseIndex];

  horse.position += roll * 2;

  const horseEl = document.getElementById("horse-" + horseIndex);
  horseEl.style.left = horse.position + "%";

  document.getElementById("result").innerText =
    horse.color.toUpperCase() + " horse moves " + roll + "!";

  if (horse.position >= trackLength) {
    document.getElementById("result").innerText =
      "🏆 " + horse.color.toUpperCase() + " HORSE WINS!";
  }
}

function resetRace() {
  horses.forEach((horse, index) => {
    horse.position = 0;
    document.getElementById("horse-" + index).style.left = "0%";
  });

  document.getElementById("result").innerText = "";
}

createTracks();
</script>

</body>
</html>
