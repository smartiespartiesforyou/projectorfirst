<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Derby Day Horse Race | ProjectorFirst</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #166534, #022c22);
  color: white;
  text-align: center;
}

.race-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
}

.name-box {
  width: 250px;
  min-width: 250px;
  font-size: 26px;
  font-weight: 900;
  text-align: right;
  background: white;
  color: black;
  padding: 12px 16px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,.35);
}

.current-name {
  background: #fde047;
  color: black;
  transform: scale(1.05);
  box-shadow: 0 0 30px gold;
}

.lane {
  height: 95px;
  flex: 1;
  position: relative;
  border-radius: 24px;
  overflow: hidden;
  background: linear-gradient(to right, #15803d, #22c55e);
  border: 4px solid rgba(255,255,255,.7);
  box-shadow: inset 0 0 18px rgba(0,0,0,.45);
}

.lane::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    90deg,
    rgba(255,255,255,.18),
    rgba(255,255,255,.18) 4px,
    transparent 4px,
    transparent 70px
  );
}

.horse {
  position: absolute;
  top: 52%;
  transform: translateY(-50%) scaleX(-1);
  font-size: 58px;
  z-index: 2;
  transition: left .8s ease;
}

.finish-line {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 24px;
  background: repeating-linear-gradient(
    45deg,
    black,
    black 10px,
    white 10px,
    white 20px
  );
  z-index: 4;
}

.active-lane {
  box-shadow: 0 0 35px gold, inset 0 0 18px rgba(0,0,0,.45);
  border-color: gold;
}

.shake {
  animation: shake .35s;
}

@keyframes shake {
  0% { transform: rotate(0deg); }
  25% { transform: rotate(10deg); }
  50% { transform: rotate(-10deg); }
  75% { transform: rotate(10deg); }
  100% { transform: rotate(0deg); }
}

.winner-pop {
  animation: pop .6s ease;
}

@keyframes pop {
  0% { transform: scale(.7); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

@media (max-width: 900px) {
  .race-row {
    flex-direction: column;
    align-items: stretch;
  }

  .name-box {
    width: 100%;
    min-width: 100%;
    text-align: center;
  }
}
</style>
</head>

<body class="p-6">

<h1 class="text-6xl font-extrabold mb-2">🏇 Derby Day Horse Race</h1>
<p class="text-2xl mb-6">Pick your horse, roll the dice, and cheer them on!</p>

<div id="setup" class="bg-white text-black p-6 rounded-3xl max-w-6xl mx-auto mb-8 shadow-2xl">
  <h2 class="text-3xl font-extrabold mb-4">Enter Resident Names</h2>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
    <input id="name0" class="p-3 text-2xl border-4 rounded-xl" placeholder="Red Horse">
    <input id="name1" class="p-3 text-2xl border-4 rounded-xl" placeholder="Blue Horse">
    <input id="name2" class="p-3 text-2xl border-4 rounded-xl" placeholder="Green Horse">
    <input id="name3" class="p-3 text-2xl border-4 rounded-xl" placeholder="Purple Horse">
    <input id="name4" class="p-3 text-2xl border-4 rounded-xl" placeholder="Orange Horse">
    <input id="name5" class="p-3 text-2xl border-4 rounded-xl" placeholder="Pink Horse">
  </div>

  <button onclick="startRace()" class="bg-green-700 text-white text-3xl font-extrabold px-10 py-4 rounded-2xl shadow-lg">
    🎺 Start Derby Race
  </button>
</div>

<div id="game" class="hidden">

  <div id="turnBox" class="text-4xl font-extrabold bg-yellow-300 text-black inline-block px-8 py-4 rounded-3xl shadow-2xl mb-4">
    Current Turn
  </div>

  <br>

  <div id="dice" class="text-9xl bg-white text-black inline-block rounded-3xl px-12 py-5 shadow-2xl mb-4">
    🎲
  </div>

  <div id="message" class="text-4xl font-extrabold mb-6">
    Ready to race!
  </div>

  <div id="track" class="max-w-7xl mx-auto mb-8"></div>

  <button onclick="rollDice()" class="bg-yellow-400 text-black text-4xl font-extrabold px-12 py-6 rounded-3xl shadow-2xl">
    🎲 Roll Dice
  </button>

  <button onclick="resetRace()" class="bg-red-600 text-white text-4xl font-extrabold px-12 py-6 rounded-3xl shadow-2xl ml-4">
    Reset
  </button>

</div>

<div id="winnerBox" class="hidden winner-pop bg-yellow-300 text-black rounded-3xl shadow-2xl p-10 max-w-5xl mx-auto mt-8">
  <div class="text-7xl mb-4">🏆🌹🎉</div>
  <div id="winnerText" class="text-6xl font-extrabold"></div>
</div>

<script>
const colors = [
  "#dc2626",
  "#2563eb",
  "#16a34a",
  "#9333ea",
  "#f97316",
  "#db2777"
];

const colorNames = [
  "Red",
  "Blue",
  "Green",
  "Purple",
  "Orange",
  "Pink"
];

const diceFaces = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];

let horses = [];
let raceOver = false;
let lastMoved = null;
let currentTurn = 0;
let audioCtx = null;

function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }

  return audioCtx;
}

function playTone(freq, duration, type = "square", volume = 0.08) {
  const ctx = getAudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = type;
  osc.frequency.value = freq;

  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + duration);
}

function playTrumpetIntro() {
  const notes = [523, 659, 784, 1046];
  notes.forEach((note, i) => {
    setTimeout(() => playTone(note, 0.22, "square", 0.09), i * 180);
  });
}

function playDiceSound() {
  playTone(220, 0.08, "square", 0.08);
  setTimeout(() => playTone(260, 0.08, "square", 0.08), 90);
  setTimeout(() => playTone(190, 0.08, "square", 0.08), 180);
}

function playGallopSound() {
  playTone(120, 0.07, "triangle", 0.12);
  setTimeout(() => playTone(95, 0.07, "triangle", 0.12), 120);
  setTimeout(() => playTone(120, 0.07, "triangle", 0.12), 240);
  setTimeout(() => playTone(95, 0.07, "triangle", 0.12), 360);
}

function playCrowdCheer() {
  const notes = [523, 659, 784, 880, 1046, 784, 1046];

  notes.forEach((note, i) => {
    setTimeout(() => playTone(note, 0.18, "sawtooth", 0.07), i * 120);
  });

  setTimeout(() => playTone(1200, 0.3, "square", 0.05), 700);
  setTimeout(() => playTone(900, 0.3, "square", 0.05), 850);
}

function startRace() {
  getAudioContext();
  playTrumpetIntro();

  horses = [];
  raceOver = false;
  lastMoved = null;
  currentTurn = 0;

  for (let i = 0; i < 6; i++) {
    const typedName = document.getElementById("name" + i).value.trim();

    horses.push({
      name: typedName || colorNames[i] + " Horse",
      color: colors[i],
      colorName: colorNames[i],
      position: 0
    });
  }

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  document.getElementById("winnerBox").classList.add("hidden");
  document.getElementById("dice").innerText = "🎲";

  updateTurnMessage();
  drawTrack();
}

function updateTurnMessage() {
  if (!horses.length) return;

  document.getElementById("turnBox").innerText =
    "Current Turn: #" + (currentTurn + 1) + " " + horses[currentTurn].name;

  document.getElementById("message").innerText =
    horses[currentTurn].name.toUpperCase() + " is up!";
}

function drawTrack() {
  const track = document.getElementById("track");
  track.innerHTML = "";

  horses.forEach((horse, index) => {
    const row = document.createElement("div");
    row.className = "race-row";

    const nameBox = document.createElement("div");
    nameBox.className = "name-box";
    nameBox.innerText = "#" + (index + 1) + " " + horse.name;
    nameBox.style.border = "6px solid " + horse.color;

    if (index === currentTurn && !raceOver) {
      nameBox.classList.add("current-name");
    }

    const lane = document.createElement("div");
    lane.className = "lane";
    lane.id = "lane-" + index;

    if (lastMoved === index) {
      lane.classList.add("active-lane");
    }

    const horseEl = document.createElement("div");
    horseEl.className = "horse";
    horseEl.id = "horse-" + index;
    horseEl.innerText = "🐎";
    horseEl.style.color = horse.color;
    horseEl.style.left = horse.position + "%";

    const finish = document.createElement("div");
    finish.className = "finish-line";

    lane.appendChild(horseEl);
    lane.appendChild(finish);

    row.appendChild(nameBox);
    row.appendChild(lane);

    track.appendChild(row);
  });
}

function rollDice() {
  if (raceOver) return;

  getAudioContext();

  const dice = document.getElementById("dice");
  dice.classList.add("shake");

  playDiceSound();

  setTimeout(() => {
    dice.classList.remove("shake");

    const roll = Math.floor(Math.random() * 6) + 1;
    const pickedHorse = currentTurn;
    const horse = horses[pickedHorse];

    dice.innerText = diceFaces[roll];

    const moveAmount = roll * 1.5;
    horse.position += moveAmount;

    if (horse.position > 88) {
      horse.position = 88;
    }

    lastMoved = pickedHorse;

    playGallopSound();

    const announcerLines = [
      "AND HERE COMES " + horse.name.toUpperCase() + "!",
      horse.name.toUpperCase() + " IS PICKING UP SPEED!",
      "THE CROWD IS CHEERING FOR " + horse.name.toUpperCase() + "!",
      horse.name.toUpperCase() + " MOVES " + roll + " SPACES!",
      "LOOK AT " + horse.name.toUpperCase() + " GO!",
      horse.name.toUpperCase() + " IS STILL IN THIS RACE!",
      horse.name.toUpperCase() + " IS CHASING THE FINISH LINE!"
    ];

    document.getElementById("message").innerText =
      announcerLines[Math.floor(Math.random() * announcerLines.length)];

    if (horse.position >= 88) {
      raceOver = true;

      drawTrack();

      playCrowdCheer();

      document.getElementById("turnBox").innerText = "Race Complete!";
      document.getElementById("message").innerText = "🏆 We have a winner!";
      document.getElementById("winnerText").innerText =
        horse.name + " wins the Derby Day Race!";
      document.getElementById("winnerBox").classList.remove("hidden");
      return;
    }

    currentTurn = (currentTurn + 1) % horses.length;

    drawTrack();

    setTimeout(() => {
      updateTurnMessage();
      drawTrack();
    }, 900);

  }, 350);
}

function resetRace() {
  getAudioContext();

  raceOver = false;
  lastMoved = null;
  currentTurn = 0;

  horses.forEach(horse => {
    horse.position = 0;
  });

  document.getElementById("dice").innerText = "🎲";
  document.getElementById("winnerBox").classList.add("hidden");

  playTrumpetIntro();
  updateTurnMessage();
  drawTrack();
}
</script>

</body>
</html>
