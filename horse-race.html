<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Derby Day Race | ProjectorFirst</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: Arial;
  background: radial-gradient(circle, #166534, #022c22);
  color: white;
  text-align: center;
}

.card {
  border-radius: 25px;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
  transition: all .3s;
}

.active {
  transform: scale(1.1);
  box-shadow: 0 0 30px gold;
}

.progress {
  height: 20px;
  background: rgba(255,255,255,.3);
  border-radius: 999px;
  margin-top: 10px;
}

.bar {
  height: 100%;
  border-radius: 999px;
}
</style>
</head>

<body class="p-6">

<h1 class="text-6xl font-extrabold mb-4">🏇 DERBY DAY RACE</h1>
<p class="text-2xl mb-6">Dress up, pick your horse, and cheer!</p>

<div id="setup" class="bg-white text-black p-6 rounded-3xl max-w-5xl mx-auto mb-8">
<h2 class="text-3xl mb-4 font-bold">Enter Resident Names</h2>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
<input id="n0" class="p-3 text-2xl border rounded-xl" placeholder="Horse #1">
<input id="n1" class="p-3 text-2xl border rounded-xl" placeholder="Horse #2">
<input id="n2" class="p-3 text-2xl border rounded-xl" placeholder="Horse #3">
<input id="n3" class="p-3 text-2xl border rounded-xl" placeholder="Horse #4">
<input id="n4" class="p-3 text-2xl border rounded-xl" placeholder="Horse #5">
<input id="n5" class="p-3 text-2xl border rounded-xl" placeholder="Horse #6">
</div>

<button onclick="start()" class="bg-green-700 text-white text-3xl px-10 py-4 rounded-2xl">
START RACE
</button>
</div>

<div id="game" class="hidden">

<div id="dice" class="text-9xl mb-4">🎲</div>

<div id="msg" class="text-4xl font-extrabold mb-6">
Ready to race!
</div>

<div id="board" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl mx-auto mb-8"></div>

<button onclick="roll()" class="bg-yellow-400 text-black text-4xl px-12 py-5 rounded-2xl">
ROLL DICE
</button>

</div>

<div id="winner" class="hidden text-black bg-yellow-300 p-10 rounded-3xl text-6xl font-extrabold">
🏆 WINNER!
</div>

<audio id="rollSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_9c2d6f6e1c.mp3"></audio>
<audio id="moveSound" src="https://cdn.pixabay.com/audio/2022/03/10/audio_0f8f64b44c.mp3"></audio>
<audio id="winSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_4f6c0f5f5f.mp3"></audio>

<script>
const colors = ["#ef4444","#3b82f6","#22c55e","#a855f7","#f97316","#ec4899"];
let horses = [];
let over = false;

function start(){
  horses = [];
  over = false;

  for(let i=0;i<6;i++){
    const name = document.getElementById("n"+i).value || "Horse "+(i+1);
    horses.push({name:name,pos:0});
  }

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  draw();
}

function draw(){
  const board = document.getElementById("board");
  board.innerHTML = "";

  horses.forEach((h,i)=>{
    const div = document.createElement("div");
    div.className = "card";
    div.style.background = colors[i];

    div.innerHTML = `
      #${i+1}<br>
      🐎<br>
      ${h.name}
      <div class="progress">
        <div class="bar" style="width:${h.pos}%; background:white;"></div>
      </div>
    `;

    board.appendChild(div);
  });
}

function roll(){
  if(over) return;

  document.getElementById("rollSound").play();

  const dice = Math.floor(Math.random()*6)+1;
  document.getElementById("dice").innerText = ["","⚀","⚁","⚂","⚃","⚄","⚅"][dice];

  const pick = Math.floor(Math.random()*horses.length);

  horses[pick].pos += dice*8;

  document.getElementById("moveSound").play();

  const sayings = [
    "AND HERE COMES "+horses[pick].name+"!",
    horses[pick].name+" IS FLYING!",
    horses[pick].name+" TAKES THE LEAD!",
    "THE CROWD LOVES "+horses[pick].name+"!",
    horses[pick].name+" SURGES AHEAD!"
  ];

  document.getElementById("msg").innerText =
    sayings[Math.floor(Math.random()*sayings.length)];

  draw();

  if(horses[pick].pos >= 100){
    over = true;
    document.getElementById("winSound").play();

    const w = document.getElementById("winner");
    w.innerText = "🏆 "+horses[pick].name+" WINS!";
    w.classList.remove("hidden");
  }
}
</script>

</body>
</html>
