<body class="bg-blue-900 text-white flex flex-col items-center p-4 md:p-6">

  <!-- Header: consistent with the other games -->
  <div class="w-full max-w-6xl flex flex-wrap justify-between items-center gap-3 mb-4">
    <a href="apps.html" class="bg-blue-700 px-5 py-3 rounded-xl font-bold text-lg md:text-xl hover:bg-blue-800">← Back to Apps</a>
    <h1 class="text-3xl md:text-5xl font-extrabold">🗺️ Guess the State</h1>
    <button onclick="toggleFullScreen()" class="bg-blue-700 px-5 py-3 rounded-xl font-bold text-lg md:text-xl hover:bg-blue-800">⛶ Full Screen</button>
  </div>

  <p class="text-lg md:text-2xl font-semibold text-blue-200 mb-4 text-center">
    Three clues, hardest first. How fast can the room guess it?
  </p>

  <!-- Clue Display -->
  <div id="clueBox" class="bg-blue-800 rounded-2xl shadow-xl w-full max-w-4xl px-6 py-8 md:px-10">
    <div id="clueLabel" class="text-yellow-300 font-extrabold text-xl md:text-2xl mb-4">CLUE 1</div>
    <div id="clueList" class="space-y-4"></div>
  </div>

  <!-- Reveal Display -->
  <div id="answer" class="answer-text text-yellow-300 mt-6 text-center hidden pop">
  </div>
  <div id="capital" class="text-xl md:text-3xl font-bold text-blue-200 mt-2 hidden"></div>

  <!-- Controls -->
  <div class="flex flex-wrap justify-center gap-4 mt-6">
    <button id="clueBtn" onclick="nextClue()" class="bg-yellow-400 text-blue-900 px-8 py-4 rounded-2xl font-extrabold text-xl md:text-2xl hover:bg-yellow-300">Another Clue</button>
    <button id="revealBtn" onclick="revealState()" class="bg-green-600 px-8 py-4 rounded-2xl font-extrabold text-xl md:text-2xl hover:bg-green-700">Reveal State</button>
    <button id="nextBtn" onclick="nextState()" class="bg-indigo-500 px-8 py-4 rounded-2xl font-extrabold text-xl md:text-2xl hover:bg-indigo-600">Next State →</button>
  </div>

  <div id="progress" class="mt-5 text-lg md:text-xl font-bold text-blue-300"></div>

<script>

  { name:"IDAHO", capital:"Boise", clues:["Lewis and Clark crossed its rugged Bitterroot Mountains in 1805.","Evel Knievel tried to jump its Snake River Canyon on a rocket cycle.","It's world-famous for its potatoes."]},
  { name:"ILLINOIS", capital:"Springfield", clues:["Historic Route 66 begins in its biggest city.","Abraham Lincoln practiced law in its capital.","Its biggest city is Chicago, the Windy City."]},
  { name:"INDIANA", capital:"Indianapolis", clues:["Its people have been called 'Hoosiers' for nearly 200 years — and nobody's sure why!","High school basketball is practically a religion here.","Every May, race cars run 500 miles in its capital city."]},
  { name:"IOWA", capital:"Des Moines", clues:["Every four years, its caucuses kick off the presidential race.","The movie 'Field of Dreams' was set and filmed here.","It grows more corn than any other state."]},
  { name:"KANSAS", capital:"Topeka", clues:["Cowboys drove cattle to its wild frontier town of Dodge City.","Amelia Earhart was born here.","Dorothy and Toto were from here — 'we're not in ___ anymore!'"]},
  { name:"KENTUCKY", capital:"Frankfort", clues:["Nearly all of the world's bourbon is made here.","Colonel Sanders started frying chicken here.","Every May, it hosts the most famous horse race in America."]},
  { name:"LOUISIANA", capital:"Baton Rouge", clues:["Its counties aren't called counties — they're called parishes.","Jazz music was born in its most famous city.","It's home to Mardi Gras and gumbo."]},
  { name:"MAINE", capital:"Augusta", clues:["It's the easternmost state — the first to see the sunrise.","Author Stephen King lives here and sets many stories here.","It's famous for lobster and lighthouses."]},

  { name:"MICHIGAN", capital:"Lansing", clues:["It touches four of the five Great Lakes.","Motown music was born in its biggest city.","It's shaped like a mitten and famous for making cars."]},

  { name:"NEW HAMPSHIRE", capital:"Concord", clues:["Its state motto is 'Live Free or Die.'","Every four years it holds the first presidential primary.","It's the Granite State, in northern New England."]},

  { name:"OHIO", capital:"Columbus", clues:["Both Neil Armstrong and John Glenn were born here.","Seven presidents were born here — more than almost any state.","It's the Buckeye State, home of the Rock and Roll Hall of Fame."]},
  { name:"OKLAHOMA", capital:"Oklahoma City", clues:["In 1889, settlers raced to claim free land here — some snuck in 'sooner.'","Cowboy humorist Will Rogers was its favorite son.","A famous musical says the wind comes sweepin' down its plain."]},
  { name:"OREGON", capital:"Salem", clues:["Crater Lake, the deepest lake in America, fills one of its old volcanoes.","Pioneers walked 2,000 miles on a famous trail to get here.","It's the Beaver State, home to Portland's rose gardens."]},
  { name:"PENNSYLVANIA", capital:"Harrisburg", clues:["A groundhog named Phil predicts the weather here every February.","Hershey built his chocolate empire here.","The Liberty Bell rings — well, sits — in its biggest city."]},
  { name:"RHODE ISLAND", capital:"Providence", clues:["Roger Williams founded it seeking religious freedom in 1636.","The Gilded Age rich built summer 'cottages' — really mansions — in its Newport.","It's the smallest state in the country."]},
  { name:"SOUTH CAROLINA", capital:"Columbia", clues:["The first shots of the Civil War were fired at its Fort Sumter.","Its historic city of Charleston is famous for charm and cobblestones.","A palmetto tree stands on its state flag."]},
  { name:"SOUTH DAKOTA", capital:"Pierre", clues:["Wild Bill Hickok was playing poker in its town of Deadwood when his luck ran out.","Its Badlands look like the surface of the moon.","Four presidents' faces are carved into its Mount Rushmore."]},
  { name:"TENNESSEE", capital:"Nashville", clues:["The Great Smoky Mountains rise along its eastern border.","Elvis called its Graceland mansion home.","Country music's Grand Ole Opry plays in its capital."]},
  { name:"TEXAS", capital:"Austin", clues:["It was its own independent country for nine years.","'Remember the Alamo!' was shouted here.","Everything's bigger in the Lone Star State."]},
  { name:"UTAH", capital:"Salt Lake City", clues:["The golden spike joining the transcontinental railroad was driven here in 1869.","Mormon pioneers pulled handcarts a thousand miles to settle here.","Its capital is named for a giant salty lake."]},
  { name:"VERMONT", capital:"Montpelier", clues:["Ben & Jerry started their ice cream empire in an old gas station here.","It makes more maple syrup than any other state.","It's the Green Mountain State."]},
  { name:"VIRGINIA", capital:"Richmond", clues:["Jamestown, the first permanent English colony, was founded here in 1607.","Eight presidents were born here — the most of any state.","Its slogan says it's 'for lovers.'"]},
  { name:"WASHINGTON", capital:"Olympia", clues:["It grows more apples than any other state.","The Space Needle rises over its biggest city.","It's the Evergreen State — the only one named for a president."]},
  { name:"WEST VIRGINIA", capital:"Charleston", clues:["It split away from its neighbor during the Civil War.","Coal mining shaped its history and its people.","John Denver sang 'Country Roads' about it — 'almost heaven.'"]},
  { name:"WISCONSIN", capital:"Madison", clues:["Harley-Davidson motorcycles have been built here since 1903.","Its football fans proudly wear foam cheese on their heads.","It's America's Dairyland, home of the Green Bay Packers."]},
  { name:"WYOMING", capital:"Cheyenne", clues:["It was the first place in the nation where women could vote.","Old Faithful erupts here in the world's first national park.","It has the fewest people of any state — pure cowboy country."]}
];

let deck = [];
let idx = 0;
let clueCount = 1;
let revealed = false;

const $ = id => document.getElementById(id);

function shuffle(arr){
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderClues(){
  const s = deck[idx];
  $("clueList").innerHTML = "";
  for (let i = 0; i < clueCount; i++) {
    const div = document.createElement("div");
    div.className = "clue-line" + (i === clueCount - 1 ? " pop" : " opacity-60");
    div.textContent = (i + 1) + ". " + s.clues[i];
    $("clueList").appendChild(div);
  }
  $("clueLabel").textContent = clueCount < 3 ? "CLUE " + clueCount : "FINAL CLUE";
  $("clueBtn").style.display = clueCount < 3 ? "inline-block" : "none";
}

function loadState(){
  clueCount = 1;
  revealed = false;
  $("answer").classList.add("hidden");
  $("capital").classList.add("hidden");
  $("revealBtn").style.display = "inline-block";
  renderClues();
  $("progress").textContent = "State " + (idx + 1) + " of " + deck.length;
}

function nextClue(){
  if (clueCount < 3) { clueCount++; renderClues(); }
}

function revealState(){
  const s = deck[idx];
  revealed = true;
  $("answer").textContent = s.name;
  $("answer").classList.remove("hidden");
  $("capital").textContent = "Capital: " + s.capital;
  $("capital").classList.remove("hidden");
  $("revealBtn").style.display = "none";
  $("clueBtn").style.display = "none";
}

function nextState(){
  idx++;
  if (idx >= deck.length) { deck = shuffle(STATES); idx = 0; }
  loadState();
}

function toggleFullScreen(){
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

/* Space bar walks the natural flow: clue → clue → reveal → next */
document.addEventListener("keydown", (e) => {
  if (e.code !== "Space") return;
  if (e.target.tagName === "BUTTON" || e.target.tagName === "A") return;
  e.preventDefault();
  if (revealed) nextState();
  else if (clueCount < 3) nextClue();
  else revealState();
});

deck = shuffle(STATES);
idx = 0;
loadState();
</script>
