// ============ AUDIO (WebAudio — no files needed) ============
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function tone(freq, start, dur, type, vol) {
  const ctx = getCtx();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = type || "triangle";
  o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, ctx.currentTime + start);
  g.gain.exponentialRampToValueAtTime(vol || 0.25, ctx.currentTime + start + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
  o.connect(g).connect(ctx.destination);
  o.start(ctx.currentTime + start);
  o.stop(ctx.currentTime + start + dur + 0.05);
}
function popSound() { tone(520, 0, 0.12, "triangle", 0.2); }
function fanfare() {
  tone(523, 0.00, 0.18, "triangle", 0.28);
  tone(659, 0.14, 0.18, "triangle", 0.28);
  tone(784, 0.28, 0.18, "triangle", 0.28);
  tone(1047, 0.42, 0.45, "triangle", 0.32);
}

// ============ VOICE ============
function speakAnswer(text) {
  if (!document.getElementById("voiceToggle").checked) return;
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.85;
  u.pitch = 1.0;
  window.speechSynthesis.speak(u);
}

// ============ DECK ============
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function buildDeck(cat) {
  if (cat === "all") {
    let all = [];
    for (const k of Object.keys(EMOJIS)) all = all.concat(EMOJIS[k]);
    return shuffle(all);
  }
  return shuffle(EMOJIS[cat]);
}

// ============ SCREENS ============
function show(id) {
  for (const s of ["startScreen", "gameScreen", "doneScreen"]) {
    document.getElementById(s).style.display = (s === id) ? "flex" : "none";
  }
}
function goHome() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  show("startScreen");
}

// ============ GAME FLOW ============
function startGame(cat) {
  currentCategory = cat;
  deck = buildDeck(cat);
  deckIndex = 0;
  document.getElementById("categoryLabel").textContent = CATEGORY_NAMES[cat];
  show("gameScreen");
  renderEmoji();
  popSound();
}
function replayCategory() {
  startGame(currentCategory);
}
function renderEmoji() {
  revealed = false;
  const p = deck[deckIndex];
  document.getElementById("emojiDisplay").textContent = p.e;
  document.getElementById("progressLabel").textContent = "Emoji " + (deckIndex + 1) + " of " + deck.length;
  const banner = document.getElementById("answerBanner");
  banner.classList.add("hidden");
  banner.textContent = "";
  const tip = document.getElementById("tipLine");
  tip.classList.add("hidden");
  tip.textContent = "";
  document.getElementById("revealBtn").style.visibility = "visible";
}
function reveal() {
  if (revealed) return;
  revealed = true;
  const p = deck[deckIndex];
  const banner = document.getElementById("answerBanner");
  banner.textContent = p.a;
  banner.classList.remove("hidden");
  const tip = document.getElementById("tipLine");
  tip.textContent = p.t;
  tip.classList.remove("hidden");
  document.getElementById("revealBtn").style.visibility = "hidden";
  fanfare();
  throwConfetti();
  speakAnswer(p.a + ". " + p.t);
}
function nextEmoji() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  deckIndex++;
  if (deckIndex >= deck.length) {
    fanfare();
    setTimeout(fanfare, 500);
    throwConfetti(40);
    show("doneScreen");
    return;
  }
  renderEmoji();
  popSound();
}

// ============ CONFETTI ============
const CONFETTI_EMOJI = ["🎉", "✨", "⭐", "🎊", "💛", "💙"];
function throwConfetti(count) {
  const n = count || 14;
  for (let i = 0; i < n; i++) {
    const el = document.createElement("div");
    el.className = "confetti";
    el.textContent = CONFETTI_EMOJI[Math.floor(Math.random() * CONFETTI_EMOJI.length)];
    el.style.left = Math.random() * 100 + "vw";
    el.style.animationDuration = (1.8 + Math.random() * 1.6) + "s";
    el.style.animationDelay = (Math.random() * 0.4) + "s";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4200);
  }
}

// ============ SPACE BAR: reveal, then advance ============
document.addEventListener("keydown", function (ev) {
  if (ev.code !== "Space" && ev.key !== " ") return;
  if (document.getElementById("gameScreen").style.display === "none") return;
  ev.preventDefault();
  if (!revealed) reveal();
  else nextEmoji();
});
</script>
